/* === Главный рендер === */
function render(){
  const app=document.getElementById('app'),sh=document.getElementById('shell');

  // 1. Если роль не выбрана — экран выбора
  if(state.role===null){
    app.innerHTML=viewRolePick();
    removeTabs();removeFab();
    renderSidebar();bind();return;
  }
  // 2. Тренер без профиля — онбординг тренера
  if(state.role==='coach' && !state.coach){
    app.innerHTML=viewCoachOnboarding();
    removeTabs();removeFab();
    renderSidebar();bind();return;
  }
  // 3. Спортсмен без профиля — онбординг спортсмена
  if(state.role==='athlete' && !state.profile){
    app.innerHTML=viewOnboarding();
    removeTabs();removeFab();
    renderSidebar();bind();return;
  }

  // Редирект старых маршрутов
  if(state.route.name==='profile') state.route={name:'dashboard',params:{}};
  if(state.route.name==='journal') state.route={name:'dashboard',params:{}};

  const r=state.route;let html='',tabs=true,fab=false;

  // Маршруты тренера
  if(r.name==='coach-dashboard'){html=viewCoachDashboard();tabs=true;fab=true}
  else if(r.name==='athlete-add'){html=viewAthleteAdd();tabs=false}
  // Маршруты спортсмена (и тренер в режиме просмотра спортсмена)
  else if(r.name==='dashboard'){
    if(state.role==='coach' && !currentAthlete()){html=viewCoachDashboard()}
    else html=viewProfile(); // viewProfile пока = Дашборд (переименуем позже)
  }
  else if(r.name==='events'){html=viewEvents();fab=(state.role!=='coach')}
  else if(r.name==='stats'){html=viewStats()}
  else if(r.name==='trainings'){html=viewTrainings?viewTrainings():('<div class="empty-state">Раздел «Тренировки» — в следующем обновлении.</div>')}
  else if(r.name==='weight'){html=viewWeight?viewWeight():('<div class="empty-state">Раздел «Вес» — в следующем обновлении.</div>')}
  else if(r.name==='opponents'){html=viewOpponents?viewOpponents():('<div class="empty-state">Раздел «Соперники» — в следующем обновлении.</div>')}
  else if(r.name==='opponent'){html=viewOpponentDetail?viewOpponentDetail(r.params.name):'';tabs=false}
  else if(r.name==='event'){html=viewEventDetail(r.params.id);tabs=false}
  else if(r.name==='event-new'){html=viewEventForm('new');tabs=false}
  else if(r.name==='event-edit'){html=viewEventForm('edit',r.params.id);tabs=false}
  else if(r.name==='fight-new'){html=viewFightForm('new',{eventId:r.params.id});tabs=false}
  else if(r.name==='fight-edit'){html=viewFightForm('edit',{id:r.params.id});tabs=false}
  else if(r.name==='settings'){html=viewSettings();tabs=false}
  else html=viewProfile();

  app.innerHTML=html;
  tabs?addTabs():removeTabs();
  fab?addFab():removeFab();
  renderSidebar();
  bind();
}
function addTabs(){removeTabs();document.getElementById('shell').insertAdjacentHTML('beforeend',viewTabs());document.querySelectorAll('#shell .tabs .tab').forEach(b=>b.onclick=()=>go(b.dataset.tab))}
function removeTabs(){document.querySelectorAll('#shell .tabs').forEach(x=>x.remove())}
function addFab(target){
  removeFab();
  const t=target||(state.route.name==='coach-dashboard'?'athlete-add':'event-new');
  document.getElementById('shell').insertAdjacentHTML('beforeend','<button class="fab" id="fab">+</button>');
  document.getElementById('fab').onclick=()=>go(t);
}
function removeFab(){document.querySelectorAll('#shell .fab').forEach(x=>x.remove())}

/* === Биндеры === */
function bind(){
  const app=document.getElementById('app');
  app.querySelectorAll('[data-back]').forEach(b=>b.onclick=()=>history.length>1?history.back():go(state.role==='coach' && !currentAthlete()?'coach-dashboard':'dashboard'));

  // Выбор роли
  app.querySelectorAll('[data-pick-role]').forEach(b=>b.onclick=()=>{
    state.role=b.dataset.pickRole;
    save();
    render();
  });
  const roleImport=document.getElementById('role-import');
  if(roleImport) roleImport.onclick=()=>{
    const i=document.createElement('input');i.type='file';i.accept='application/json';
    i.onchange=()=>{const f=i.files[0];if(!f)return;const fr=new FileReader();
      fr.onload=()=>{try{
        const d=JSON.parse(fr.result);
        // Поддерживаем обе схемы (старую и новую)
        if(d.athletes){
          state.role=d.role||'athlete';state.coach=d.coach||null;state.athletes=d.athletes;state.currentAthleteId=d.currentAthleteId||(d.athletes[0]?.id);
        } else if(d.profile){
          const a={id:uid(),profile:d.profile,events:d.events||[],fights:d.fights||[],weights:d.weights||[],trainings:d.trainings||[],opponentNotes:{},goals:[]};
          state.role='athlete';state.athletes=[a];state.currentAthleteId=a.id;
        } else throw 0;
        syncFromAthlete();save();toast('Импортировано');render();
      }catch(e){toast('Ошибка импорта')}};
      fr.readAsText(f);
    };
    i.click();
  };

  // Форма тренера
  const coachForm=document.getElementById('coach-form');
  if(coachForm) coachForm.onsubmit=e=>{
    e.preventDefault();
    const fd=new FormData(coachForm);
    state.coach={firstName:fd.get('firstName'),lastName:fd.get('lastName'),club:fd.get('club'),city:fd.get('city'),sports:[fd.get('sport')]};
    save();go('coach-dashboard');
  };

  // Клик по карточке спортсмена — переключение
  app.querySelectorAll('[data-switch-athlete]').forEach(b=>b.onclick=()=>{
    switchAthlete(b.dataset.switchAthlete);
    go('dashboard');
  });

  // Клик на карточку соперника
  app.querySelectorAll('[data-go-opponent]').forEach(b=>b.onclick=()=>go('opponent',{name:b.dataset.goOpponent}));

  // Инлайн-форма веса
  const wInline=document.getElementById('weight-inline');
  if(wInline) wInline.onsubmit=e=>{
    e.preventDefault();
    const kg=Number(String(new FormData(wInline).get('kg')).replace(',','.'));
    if(!kg||kg<30||kg>200){toast('Некорректный вес');return}
    const today=todayISO();
    const ex=state.weights.find(w=>w.date===today);
    if(ex) ex.kg=kg; else state.weights.push({id:uid(),date:today,kg});
    save();toast('Записано');render();
  };

  // Клик по строке веса — редактирование через модалку
  app.querySelectorAll('[data-w-edit]').forEach(b=>b.onclick=()=>weightLogModal());

  // Поиск соперников
  const opSearch=document.getElementById('op-search');
  if(opSearch){
    const inp=opSearch.querySelector('input');
    let t=null;
    inp.oninput=()=>{clearTimeout(t);t=setTimeout(()=>go('opponents',{q:inp.value}),200)};
    opSearch.onsubmit=e=>{e.preventDefault();go('opponents',{q:inp.value})};
  }

  // Сохранение заметки о сопернике
  const opNote=document.getElementById('op-note-form');
  if(opNote) opNote.onsubmit=e=>{
    e.preventDefault();
    const key=decodeURIComponent(state.route.params.name||'');
    state.opponentNotes[key]=String(new FormData(opNote).get('note')||'');
    save();toast('Сохранено');
  };
  app.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>{const n=b.dataset.go,id=b.dataset.id;id?go(n,{id}):go(n)});
  app.querySelectorAll('[data-go-event]').forEach(b=>b.onclick=()=>go('event',{id:b.dataset.goEvent}));
  app.querySelectorAll('[data-events-mode]').forEach(b=>b.onclick=()=>go('events',{mode:b.dataset.eventsMode}));
  app.querySelectorAll('[data-period]').forEach(b=>b.onclick=()=>go('stats',{period:b.dataset.period}));
  app.querySelectorAll('[data-action="weight-log"]').forEach(b=>b.onclick=e=>{e.preventDefault();weightLogModal()});
  app.querySelectorAll('[data-action="training-log"]').forEach(b=>b.onclick=e=>{e.preventDefault();trainingLogModal()});
  // tab по клику (для «все →»)
  app.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>go(b.dataset.tab));
  // Голосовой ввод на разборе боя
  app.querySelectorAll('.note textarea').forEach(ta=>attachVoiceInput(ta));
  app.querySelectorAll('[data-go-fight]').forEach(b=>b.onclick=()=>go('fight-edit',{id:b.dataset.goFight}));

  const ob=document.getElementById('ob-form');
  if(ob)ob.onsubmit=e=>{
    e.preventDefault();
    const fd=new FormData(ob);
    const w=Number(fd.get('weightCategoryKg'));
    const payload={firstName:fd.get('firstName'),lastName:fd.get('lastName'),sport:fd.get('sport'),weightCategoryKg:w,weightCategoryName:WEIGHT_NAMES[w]||'',rank:fd.get('rank'),city:fd.get('city')||'',club:fd.get('club')||'',coach:fd.get('coach')||''};
    // Тренер добавляет нового — создаём athlete. Спортсмен редактирует — правим свой профиль или создаёт первого.
    if(state.role==='coach' && state.route.name==='athlete-add'){
      const a=addAthlete(payload);
      switchAthlete(a.id);
      save();
      go('coach-dashboard');
      toast('Спортсмен добавлен');
      return;
    }
    if(!currentAthlete()){
      // Первый онбординг спортсмена — создаём первого athlete
      const a=addAthlete(payload);
      state.currentAthleteId=a.id;
      syncFromAthlete();
    } else {
      state.profile=Object.assign({},state.profile||{},payload);
    }
    save();go('dashboard');
  };

  const pf=document.getElementById('profile-form');
  if(pf)pf.onsubmit=e=>{e.preventDefault();const fd=new FormData(pf);const w=Number(fd.get('weightCategoryKg'));Object.assign(state.profile,{firstName:fd.get('firstName'),lastName:fd.get('lastName'),sport:fd.get('sport'),weightCategoryKg:w,weightCategoryName:WEIGHT_NAMES[w]||'',rank:fd.get('rank'),city:fd.get('city'),club:fd.get('club'),coach:fd.get('coach')});save();toast('Сохранено');go('dashboard')};

  const ef=document.getElementById('event-form');
  if(ef){
    const sb=document.querySelector('[data-submit="event-form"]');if(sb)sb.onclick=()=>ef.requestSubmit();
    ef.onsubmit=e=>{e.preventDefault();const fd=new FormData(ef);const cur=state.route.name==='event-edit'?state.events.find(x=>x.id===state.route.params.id):null;const p={id:cur?cur.id:uid(),title:fd.get('title'),date:fd.get('date'),city:fd.get('city'),venue:fd.get('venue'),level:fd.get('level'),weightKg:Number(fd.get('weightKg')),weighIn:fd.get('weighIn')?Number(String(fd.get('weighIn')).replace(',','.')):null,walkAround:fd.get('walkAround')?Number(String(fd.get('walkAround')).replace(',','.')):null,place:fd.get('place')?Number(fd.get('place')):null,totalParticipants:fd.get('totalParticipants')?Number(fd.get('totalParticipants')):null,status:fd.get('status'),notes:fd.get('notes')};if(cur)Object.assign(cur,p);else state.events.push(p);save();go('event',{id:p.id})};
  }

  const ff=document.getElementById('fight-form');
  if(ff){
    const sb=document.querySelector('[data-submit="fight-form"]');if(sb)sb.onclick=()=>ff.requestSubmit();
    const ta=document.getElementById('tags-area'),ti=document.getElementById('tags-input'),ab=document.getElementById('add-tag');
    const sync=()=>{ti.value=Array.from(ta.querySelectorAll('.tag:not(.add)')).map(x=>x.dataset.tag).join(',')};
    ta.querySelectorAll('.tag:not(.add) .x').forEach(x=>x.onclick=e=>{e.stopPropagation();x.closest('.tag').remove();sync()});
    ab.onclick=()=>{const ex=ti.value.split(',').filter(Boolean);const sug=PRESET_TAGS.find(t=>!ex.includes(t))||'';const v=prompt('Тег (например, «Защита корпуса»)',sug);if(!v)return;const t=v.trim();if(!t||ex.includes(t))return;const el=document.createElement('span');el.className='tag';el.dataset.tag=t;el.innerHTML=esc(t)+'<span class="x">×</span>';el.querySelector('.x').onclick=e=>{e.stopPropagation();el.remove();sync()};ta.insertBefore(el,ab);sync()};
    ff.onsubmit=e=>{e.preventDefault();const fd=new FormData(ff);const ed=state.route.name==='fight-edit',cur=ed?state.fights.find(x=>x.id===state.route.params.id):null;const eid=cur?cur.eventId:state.route.params.id;const tags=(fd.get('tags')||'').split(',').map(s=>s.trim()).filter(Boolean);const p={id:cur?cur.id:uid(),eventId:eid,round:fd.get('round'),orderIndex:Number(fd.get('orderIndex'))||1,opponentName:fd.get('opponentName'),opponentClub:fd.get('opponentClub'),opponentCity:fd.get('opponentCity'),result:fd.get('result'),method:fd.get('method'),roundsTotal:Number(fd.get('roundsTotal'))||3,roundEnded:fd.get('roundEnded')?Number(fd.get('roundEnded')):null,scoreSelf:fd.get('scoreSelf'),scoreOpponent:fd.get('scoreOpponent'),worked:fd.get('worked'),didntWork:fd.get('didntWork'),tags};if(cur)Object.assign(cur,p);else state.fights.push(p);save();go('event',{id:eid})};
  }

  app.querySelectorAll('[data-del-event]').forEach(b=>b.onclick=()=>modal('Удалить турнир?','Вместе с ним удалятся все бои.',()=>{const id=b.dataset.delEvent;state.events=state.events.filter(e=>e.id!==id);state.fights=state.fights.filter(f=>f.eventId!==id);save();go('events')}));
  app.querySelectorAll('[data-del-fight]').forEach(b=>b.onclick=()=>modal('Удалить бой?','Это действие нельзя отменить.',()=>{const id=b.dataset.delFight,f=state.fights.find(x=>x.id===id),eid=f?f.eventId:null;state.fights=state.fights.filter(x=>x.id!==id);save();eid?go('event',{id:eid}):go('events')}));

  app.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{const pl=Number(b.dataset.filter),first=state.events.filter(e=>e.place===pl).sort((a,b)=>b.date.localeCompare(a.date))[0];first?go('event',{id:first.id}):toast('Пока нет турниров с этим местом')});

  const ex=document.getElementById('export-json');
  if(ex)ex.onclick=()=>{
    syncToAthlete();
    const data=JSON.stringify({role:state.role,coach:state.coach,currentAthleteId:state.currentAthleteId,athletes:state.athletes},null,2);
    const b=new Blob([data],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');
    a.href=u;a.download='trophy-backup-'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u);
  };
  const im=document.getElementById('import-json');
  if(im)im.onclick=()=>{
    const i=document.createElement('input');i.type='file';i.accept='application/json';
    i.onchange=()=>{const f=i.files[0];if(!f)return;const fr=new FileReader();
      fr.onload=()=>{try{
        const d=JSON.parse(fr.result);
        if(d.athletes){
          state.role=d.role||'athlete';state.coach=d.coach||null;state.athletes=d.athletes;
          state.currentAthleteId=d.currentAthleteId||(d.athletes[0]?.id);
        } else if(d.profile){
          const a={id:uid(),profile:d.profile,events:d.events||[],fights:d.fights||[],weights:d.weights||[],trainings:d.trainings||[],opponentNotes:{},goals:[]};
          state.role='athlete';state.coach=null;state.athletes=[a];state.currentAthleteId=a.id;
        } else throw 0;
        syncFromAthlete();save();toast('Импортировано');go(state.role==='coach'?'coach-dashboard':'dashboard');
      }catch(e){toast('Ошибка импорта')}};
      fr.readAsText(f);
    };
    i.click();
  };
  const rs=document.getElementById('reset-all');
  if(rs)rs.onclick=()=>modal('Удалить все данные?','Все спортсмены, их бои, вес и тренировки будут стёрты.',()=>{
    localStorage.removeItem(STORAGE_KEY);
    state.role=null;state.coach=null;state.currentAthleteId=null;state.athletes=[];
    syncFromAthlete();
    go('dashboard');
  });

  const switchRole=document.getElementById('switch-role');
  if(switchRole) switchRole.onclick=()=>modal('Сменить роль?','Данные сохранятся. Можно переключиться в другой режим.',()=>{
    state.role=state.role==='coach'?'athlete':'coach';
    if(state.role==='coach' && !state.coach){ save(); render(); return; }
    if(state.role==='athlete' && !currentAthlete() && state.athletes[0]){ state.currentAthleteId=state.athletes[0].id; syncFromAthlete(); }
    save();go(state.role==='coach'?'coach-dashboard':'dashboard');
  });
}

/* === Модалка / тост === */
function modal(t,txt,ok){const el=document.createElement('div');el.className='modal-bg';el.innerHTML=`<div class="modal"><h3>${esc(t)}</h3><p>${esc(txt)}</p><div class="actions"><button class="btn btn-danger" id="m-ok">Удалить</button><button class="btn btn-ghost" id="m-cancel">Отмена</button></div></div>`;document.body.appendChild(el);el.querySelector('#m-ok').onclick=()=>{el.remove();ok()};el.querySelector('#m-cancel').onclick=()=>el.remove();el.onclick=e=>{if(e.target===el)el.remove()}}
function toast(m){const el=document.createElement('div');el.className='toast';el.textContent=m;document.body.appendChild(el);setTimeout(()=>el.remove(),1800)}

/* === Модалка веса === */
function weightLogModal(){
  const today=todayISO();
  const existing = state.weights.find(w=>w.date===today);
  const last = latestWeight();
  const placeholder = existing?fmtN(existing.kg):(last?fmtN(last.kg):'74,8');
  const el=document.createElement('div');
  el.className='modal-bg';
  el.innerHTML=`<div class="modal">
    <h3>${existing?'Обновить вес':'Записать вес'}</h3>
    <p>Сегодня, ${fmtDateShort(today)}${last&&!existing?' · последний замер '+fmtN(last.kg)+' кг ('+fmtDateShort(last.date)+')':''}</p>
    <form id="w-form">
      <div class="field"><label>Вес, кг</label><input name="kg" type="text" inputmode="decimal" required autofocus value="${existing?fmtN(existing.kg):''}" placeholder="${placeholder}"/></div>
      <div class="actions"><button type="submit" class="btn btn-primary">Сохранить</button>${existing?'<button type="button" class="btn-subtle-danger" id="w-del">Удалить запись</button>':'<button type="button" class="btn btn-ghost" id="w-cancel">Отмена</button>'}</div>
    </form>
  </div>`;
  document.body.appendChild(el);
  el.onclick=e=>{if(e.target===el)el.remove()};
  const cancel=el.querySelector('#w-cancel');if(cancel)cancel.onclick=()=>el.remove();
  const del=el.querySelector('#w-del');if(del)del.onclick=()=>{state.weights=state.weights.filter(w=>w.date!==today);save();el.remove();render();toast('Удалено')};
  el.querySelector('#w-form').onsubmit=ev=>{
    ev.preventDefault();
    const kg=Number(String(new FormData(ev.target).get('kg')).replace(',','.'));
    if(!kg||kg<30||kg>200){toast('Некорректный вес');return}
    if(existing) existing.kg=kg;
    else state.weights.push({id:uid(),date:today,kg});
    save();el.remove();render();toast('Сохранено');
  };
}

/* === Модалка тренировки === */
const TRAIN_TYPES=[{v:'technique',n:'Техника',e:'Т'},{v:'sparring',n:'Спарринг',e:'С'},{v:'cardio',n:'Кардио',e:'К'},{v:'strength',n:'ОФП',e:'О'},{v:'recovery',n:'Восстан.',e:'В'}];
function trainingLogModal(){
  const today=todayISO();
  const today_trainings = state.trainings.filter(t=>t.date===today);
  const el=document.createElement('div');
  el.className='modal-bg';
  el.innerHTML=`<div class="modal">
    <h3>Тренировка</h3>
    <p>Сегодня, ${fmtDateShort(today)}${today_trainings.length?' · уже отмечено: '+today_trainings.length:''}</p>
    <form id="tr-form">
      <div class="field"><label>Тип</label>
        <div class="tr-types">${TRAIN_TYPES.map(t=>`<button type="button" class="tr-type" data-type="${t.v}"><span class="tr-e">${t.e}</span>${t.n}</button>`).join('')}</div>
        <input type="hidden" name="type" required/>
      </div>
      <div class="field-row">
        <div class="field"><label>Длительность, мин</label><input name="durationMin" type="number" min="10" max="360" value="90"/></div>
        <div class="field"><label>Ощущения 1–5</label>
          <select name="feel"><option value="3" selected>3 — норм</option><option value="5">5 — отлично</option><option value="4">4 — хорошо</option><option value="2">2 — так себе</option><option value="1">1 — тяжело</option></select>
        </div>
      </div>
      <div class="field"><label>Заметка (опц.)</label><input name="note" placeholder="Что отрабатывали"/></div>
      <div class="actions"><button type="submit" class="btn btn-primary">Записать</button><button type="button" class="btn btn-ghost" id="tr-cancel">Отмена</button></div>
    </form>
    ${today_trainings.length?`<div style="margin-top:14px"><div class="label">Сегодня</div>${today_trainings.map(t=>{const typ=TRAIN_TYPES.find(x=>x.v===t.type)||{n:t.type,e:'•'};return `<div class="tr-done"><span>${typ.e}</span> ${esc(typ.n)} · ${t.durationMin} мин${t.note?' · '+esc(t.note):''} <button class="x" data-del-tr="${t.id}">×</button></div>`}).join('')}</div>`:''}
  </div>`;
  document.body.appendChild(el);
  el.onclick=e=>{if(e.target===el)el.remove()};
  el.querySelector('#tr-cancel').onclick=()=>el.remove();
  const typeInput=el.querySelector('input[name="type"]');
  el.querySelectorAll('.tr-type').forEach(b=>b.onclick=()=>{el.querySelectorAll('.tr-type').forEach(x=>x.classList.remove('on'));b.classList.add('on');typeInput.value=b.dataset.type});
  el.querySelectorAll('[data-del-tr]').forEach(b=>b.onclick=()=>{state.trainings=state.trainings.filter(t=>t.id!==b.dataset.delTr);save();el.remove();render();toast('Удалено')});
  el.querySelector('#tr-form').onsubmit=ev=>{
    ev.preventDefault();
    const fd=new FormData(ev.target);
    if(!fd.get('type')){toast('Выбери тип');return}
    state.trainings.push({id:uid(),date:today,type:fd.get('type'),durationMin:Number(fd.get('durationMin'))||60,feel:Number(fd.get('feel'))||3,note:fd.get('note')||''});
    save();el.remove();render();toast('Записано');
  };
}

/* === Голосовой ввод === */
function attachVoiceInput(textarea){
  if(!window.SpeechRecognition && !window.webkitSpeechRecognition) return;
  const wrap = textarea.parentNode;
  if(!wrap || wrap.querySelector('.voice-btn')) return;
  wrap.style.position='relative';
  const btn=document.createElement('button');
  btn.type='button'; btn.className='voice-btn'; btn.title='Голосовой ввод';
  btn.innerHTML=`<svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10v2a7 7 0 0 0 14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>`;
  wrap.appendChild(btn);
  let rec=null, active=false;
  btn.onclick=()=>{
    if(active){try{rec.stop()}catch(e){}return}
    const R = window.SpeechRecognition || window.webkitSpeechRecognition;
    rec = new R();
    rec.lang='ru-RU'; rec.continuous=true; rec.interimResults=false;
    rec.onresult=e=>{
      let txt='';
      for(let i=e.resultIndex;i<e.results.length;i++) if(e.results[i].isFinal) txt+=e.results[i][0].transcript+' ';
      if(txt){textarea.value=(textarea.value?textarea.value+' ':'')+txt.trim(); textarea.dispatchEvent(new Event('input'))}
    };
    rec.onend=()=>{active=false;btn.classList.remove('rec')};
    rec.onerror=()=>{active=false;btn.classList.remove('rec');toast('Микрофон недоступен')};
    try{rec.start();active=true;btn.classList.add('rec')}catch(e){toast('Не удалось запустить')}
  };
}

/* === History === */
window.addEventListener('popstate',e=>{if(e.state&&e.state.route){state.route=e.state.route;render()}else{state.route={name:state.role==='coach'?'coach-dashboard':'dashboard',params:{}};render()}});

/* === Старт === */
load();
if(location.hash){const n=location.hash.slice(1);if(['dashboard','coach-dashboard','events','trainings','weight','opponents','stats','settings'].includes(n))state.route={name:n,params:{}}}
render();

if('serviceWorker' in navigator && location.protocol.startsWith('http')){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}))}
</script>
