<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#0a1420" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Trophy" />
<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="./icon-192.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="./icon-192.svg" />
<title>Trophy — дневник спортсмена</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    /* Тёмная тема с teal-акцентом */
    --bg-primary:#0a1420;           /* глубокий навигационно-тёмный фон */
    --bg-secondary:#14202e;          /* карточки, блоки */
    --bg-card:#1a2835;               /* более светлые карточки */
    --bg-dark:#1a2835;               /* совместимость со старыми "акцентными тёмными" карточками */
    --bg-subtle:#1e2a38;              /* разделители */
    --text-primary:#e8eef5;           /* почти белый */
    --text-secondary:#7a8a9a;         /* приглушённый серый */
    --text-tertiary:#4e5a6b;          /* ещё темнее */
    --text-on-dark:#e8eef5;
    --text-on-dark-dim:#7a8a9a;
    --accent:#00e5a0;                 /* главный акцент teal */
    --accent-dim:#00b87f;
    --accent-soft:#006a4a;            /* тёмный вариант для фонов */
    /* Совместимость со старыми gold-ссылками (теперь ведут на teal) */
    --gold:#00e5a0; --gold-soft:#00c488;
    --silver:#95a5ba; --bronze:#b28860;
    --success:#00e5a0; --danger:#ff5577; --warning:#ffb347;
    --border:#1e2a38;
    --r-sm:10px; --r-md:14px; --r-lg:20px; --r-xl:28px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg-primary);font-family:'Inter',system-ui,-apple-system,sans-serif;color:var(--text-primary);overscroll-behavior:none}
  body{min-height:100vh;display:flex;justify-content:center;align-items:stretch}
  button{font:inherit;cursor:pointer;border:none;background:none;color:inherit;text-align:left}
  input,textarea,select{font:inherit;color:inherit}
  a{color:inherit;text-decoration:none}

  /* Мобильный дефолт: фуллскрин, без рамки */
  body{background:var(--bg-primary)}
  #shell{width:100%;max-width:none;background:var(--bg-primary);min-height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden}

  /* Планшет (768–1023px): широкий одноколоночный контент + топбар с бургером */
  @media (min-width:768px) and (max-width:1023px){
    body{background:var(--bg-primary);padding:0;justify-content:flex-start}
    #shell{max-width:none;min-height:100vh}
    .sbar{display:none}
    #app{padding:28px 40px 120px}
    #app > *{max-width:720px;width:100%;margin-left:auto;margin-right:auto}
    .tabs{display:none!important}
  }

  /* Десктоп ≥1024px: сайдбар слева, широкий контент, без рамки */
  #sidebar{display:none}
  @media (min-width:1024px){
    body{background:var(--bg-primary);padding:0;justify-content:flex-start}
    #shell{flex-direction:row;max-width:none;min-height:100vh;overflow:visible}
    #sidebar{display:flex;flex-direction:column;width:240px;flex-shrink:0;padding:28px 18px;border-right:1px solid var(--border);background:var(--bg-primary);position:sticky;top:0;height:100vh}
    .sbar{display:none}
    .tabs{display:none!important}
    .fab{right:40px;bottom:40px}
  }
  @media (display-mode:standalone){body{padding:0} #shell{border-radius:0;box-shadow:none;max-height:none}}

  /* Сайдбар */
  #sidebar{background:var(--bg-secondary);border-right-color:var(--border)}
  #sidebar .brand{display:flex;align-items:center;gap:10px;padding:6px 10px;margin-bottom:22px}
  #sidebar .brand .logo{width:38px;height:38px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:18px;color:#0a1420;letter-spacing:-1px;flex-shrink:0}
  #sidebar .brand .logo-text{display:flex;flex-direction:column;gap:2px;line-height:1}
  #sidebar .brand .name{font-size:15px;font-weight:600;letter-spacing:-.3px;color:var(--text-primary)}
  #sidebar .brand .subtitle{font-size:9.5px;font-weight:500;letter-spacing:.8px;color:var(--accent);text-transform:uppercase}
  #sidebar .s-group-label{font-size:9.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--text-tertiary);font-weight:500;padding:12px 14px 6px}
  #sidebar .s-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;border-radius:10px;font-size:13px;color:var(--text-secondary);width:100%;transition:background .1s,color .1s;cursor:pointer;margin-bottom:2px}
  #sidebar .s-item:hover{background:var(--bg-card);color:var(--text-primary)}
  #sidebar .s-item.on{background:var(--bg-card);color:var(--accent);font-weight:500}
  #sidebar .s-item.on:hover{background:var(--bg-card);color:var(--accent)}
  #sidebar .s-item .s-badge{font-size:10.5px;padding:2px 8px;border-radius:999px;background:var(--bg-card);color:var(--text-secondary);font-weight:500;font-feature-settings:"tnum" 1}
  #sidebar .s-item .s-badge.red{background:var(--danger);color:#fff}
  #sidebar .s-sep{flex:1}
  #sidebar .s-div{height:1px;background:var(--border);margin:14px 8px}
  #sidebar .s-foot{font-size:10.5px;color:var(--text-tertiary);padding:10px 14px;line-height:1.5}
  #sidebar .s-cta{margin:6px 4px 10px;display:block;text-align:center;padding:12px 14px;background:var(--accent);color:#0a1420;border-radius:10px;font-size:12.5px;font-weight:600;letter-spacing:.2px;cursor:pointer;border:none;width:calc(100% - 8px)}
  #sidebar .s-cta:hover{background:var(--accent-dim)}

  #app{flex:1;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;padding:18px 22px 20px;-webkit-overflow-scrolling:touch}
  @media (min-width:1024px){
    #app{padding:40px 56px 60px;align-items:flex-start}
    #app > *{width:100%;max-width:1100px}
    #app .trophy-grid{max-width:560px}
    #app .two-cards{max-width:560px}
    #app .kpi-grid{max-width:900px;grid-template-columns:repeat(4,1fr)}
    #app .field-row{max-width:600px}
    #app form{max-width:720px}
    #app .btn-primary,#app .btn-ghost,#app .btn-danger{max-width:280px}
  }
  #app::-webkit-scrollbar{width:0}

  .sbar{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:500;letter-spacing:-.2px;margin-bottom:14px;flex-shrink:0}
  .sbar .dots{letter-spacing:2px}
  .nav{display:grid;grid-template-columns:28px 1fr 90px;align-items:center;gap:8px;flex-shrink:0}
  .nav .back{width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:18px;border-radius:8px}
  .nav .back:active{background:var(--bg-subtle)}
  .nav .ctitle{text-align:center;font-size:10.5px;letter-spacing:.3px;text-transform:uppercase;color:var(--text-secondary);font-weight:500;line-height:1.2}
  .nav .act{text-align:right;font-size:13.5px;font-weight:500}

  .label{font-size:10.5px;font-weight:500;letter-spacing:.3px;text-transform:uppercase;color:var(--text-secondary)}
  .divider{height:1px;background:var(--border);margin:20px 0}
  .row{display:flex;align-items:center;justify-content:space-between}
  .num{font-feature-settings:"tnum" 1,"lnum" 1;letter-spacing:-.8px}
  .stack{display:flex;flex-direction:column;gap:8px}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 18px;border-radius:var(--r-md);font-weight:500;font-size:14px;letter-spacing:-.1px;transition:opacity .15s}
  .btn:active{opacity:.75}
  .btn-primary{background:var(--accent);color:#0a1420;width:100%;font-weight:600}
  .btn-primary:hover{background:var(--accent-dim)}
  .btn-ghost{background:var(--bg-card);color:var(--text-primary);border:1px solid var(--border);width:100%}
  .btn-ghost:hover{border-color:var(--text-secondary)}
  .btn-danger{background:transparent;color:var(--danger);border:1px solid rgba(255,85,119,.4);width:100%}
  .btn-subtle-danger{background:transparent;color:var(--text-tertiary);font-size:12.5px;font-weight:400;padding:10px 14px;text-align:center;width:100%;letter-spacing:-.1px}
  .btn-subtle-danger:hover{color:var(--danger)}
  .btn-link{padding:8px 0;color:var(--text-primary);font-weight:500;font-size:13.5px}

  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .field label{font-size:11px;letter-spacing:.3px;text-transform:uppercase;color:var(--text-secondary);font-weight:500}
  .field input,.field select,.field textarea{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--r-md);padding:13px 14px;font-size:14.5px;color:var(--text-primary);outline:none;-webkit-appearance:none;appearance:none;width:100%}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--text-primary)}
  .field textarea{min-height:90px;resize:vertical;font-family:inherit}
  .field select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' fill='none' stroke='%238a8880' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:38px}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  /* ===== Профиль ===== */
  h1.name{font-size:30px;font-weight:500;letter-spacing:-.8px;margin:6px 0;line-height:1.1}
  .subtitle{font-size:13.5px;color:var(--text-secondary)}
  .stats-row{display:flex;gap:28px;margin:6px 0 4px;flex-wrap:wrap}
  .stat{display:flex;flex-direction:column;gap:6px}
  .stat .v{font-size:26px;font-weight:500;letter-spacing:-1px;font-feature-settings:"tnum" 1}
  .stat .v sup{font-size:13px;font-weight:500;margin-left:1px;letter-spacing:0;top:-.8em}
  .stat .k{font-size:10.5px;font-weight:500;letter-spacing:.3px;color:var(--text-secondary);text-transform:uppercase}

  .trophy-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
  .trophy{background:var(--bg-dark);border-radius:var(--r-md);padding:18px 8px 14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text-on-dark);cursor:pointer;aspect-ratio:1/1}
  .trophy:active{opacity:.85}
  .trophy .medal{width:34px;height:34px}
  @media (min-width:1024px){.trophy-grid{grid-template-columns:repeat(3,minmax(0,180px))!important;max-width:560px!important}}
  @media (min-width:768px) and (max-width:1023px){.trophy-grid{grid-template-columns:repeat(3,minmax(0,160px));max-width:520px;margin-left:0}}
  .trophy .medal svg{width:100%;height:100%}
  .trophy .t-name{font-size:10px;font-weight:500;letter-spacing:.3px;text-transform:uppercase}
  .trophy .t-count{font-size:18px;font-weight:500;font-feature-settings:"tnum" 1;letter-spacing:-.4px}
  .trophy.gold .t-name{color:var(--gold)} .trophy.silver .t-name{color:var(--silver)} .trophy.bronze .t-name{color:var(--bronze)}

  .streak{display:flex;gap:6px;margin-top:10px}
  .streak .cell{flex:1 1 0;aspect-ratio:1/1;min-width:0;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;cursor:pointer}
  .streak .win{background:var(--bg-dark);color:var(--text-on-dark)}
  .streak .loss{background:var(--bg-subtle);color:#5a5a52}
  .streak .empty{background:transparent;border:1px dashed var(--border);color:var(--text-tertiary);cursor:default}

  /* ===== Обзор атлета — компактная шапка ===== */
  .overview-head{margin-bottom:18px}
  .oh-label{font-size:10px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:6px}
  .oh-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .oh-chip{display:inline-flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13px;color:var(--text-secondary);line-height:1.4;min-width:0}
  .oh-chip .oh-name{color:var(--text-primary);font-weight:500}
  .oh-chip .oh-sep{color:var(--text-tertiary);margin:0 2px}
  .oh-chip .oh-meta{color:var(--text-secondary)}

  /* ===== Hero — главное действие ===== */
  .hero-main{margin-top:8px;background:linear-gradient(135deg,var(--bg-secondary) 0%,var(--bg-card) 100%);border:1px solid var(--border);border-radius:var(--r-xl);padding:28px 30px 30px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .15s}
  .hero-main:hover{border-color:var(--accent-dim)}
  .hero-main::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
  .hero-main::after{content:"";position:absolute;right:-80px;top:-80px;width:220px;height:220px;border-radius:999px;border:1.5px solid rgba(0,229,160,.14);pointer-events:none}
  .hero-main .hm-kicker{font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--accent);font-weight:500}
  .hero-main .hm-count{display:flex;align-items:baseline;gap:14px;margin-top:16px;flex-wrap:wrap}
  .hero-main .hm-n{font-size:88px;line-height:.9;font-weight:600;letter-spacing:-5px;font-feature-settings:"tnum" 1;color:var(--text-primary)}
  .hero-main .hm-n.gold{color:var(--accent)}
  .hero-main .hm-n.silver{color:var(--silver)}
  .hero-main .hm-n.bronze{color:var(--bronze)}
  .hero-main .hm-u{font-size:14px;color:var(--text-secondary);letter-spacing:.2px;font-weight:500}
  .hero-main .hm-title{margin-top:12px;font-size:22px;font-weight:500;letter-spacing:-.4px;line-height:1.2;color:var(--text-primary)}
  .hero-main .hm-meta{margin-top:14px;display:flex;flex-wrap:wrap;gap:8px}
  .hero-main .hm-chip{display:inline-block;padding:7px 13px;border-radius:999px;font-size:12px;font-weight:500;letter-spacing:.1px;background:var(--bg-subtle);color:var(--text-secondary);border:1px solid var(--border)}
  .hero-main .hm-chip.primary{background:rgba(0,229,160,.12);color:var(--accent);border-color:rgba(0,229,160,.3)}
  .hero-main .hm-chip.muted{color:var(--text-tertiary)}
  .hero-main .hm-cta{display:inline-block;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;background:var(--accent);color:#0a1420;border:none;cursor:pointer}
  .hero-main .hm-cta:hover{background:var(--accent-dim)}
  @media (min-width:1024px){.hero-main{padding:36px 40px 40px}.hero-main .hm-n{font-size:108px}.hero-main .hm-title{font-size:26px}}

  /* Старый класс .hero-today для совместимости с другими экранами */
  .hero-today{margin-top:18px;background:var(--bg-dark);color:var(--text-on-dark);border-radius:var(--r-lg);padding:24px;position:relative;overflow:hidden;cursor:pointer}
  .hero-today:active{opacity:.95}
  .hero-today .ring{position:absolute;right:-80px;top:-80px;width:240px;height:240px;border-radius:999px;border:1.5px solid rgba(0,229,160,.25);pointer-events:none}
  .hero-today .ring::after{content:"";position:absolute;inset:40px;border-radius:999px;border:1.5px solid rgba(0,229,160,.14)}
  .hero-today .badge{font-size:10.5px;letter-spacing:.5px;font-weight:500;text-transform:uppercase;color:var(--gold)}
  .hero-today .hero-count{display:flex;align-items:baseline;gap:10px;margin-top:14px}
  .hero-today .hero-count .n{font-size:64px;line-height:.9;font-weight:500;letter-spacing:-3px;font-feature-settings:"tnum" 1}
  .hero-today .hero-count .n.gold{color:var(--gold)}
  .hero-today .hero-count .n.silver{color:var(--silver)}
  .hero-today .hero-count .n.bronze{color:var(--bronze)}
  .hero-today .hero-count .unit{font-size:13px;font-weight:500;letter-spacing:.3px;text-transform:uppercase;color:var(--text-on-dark-dim)}
  .hero-today .hero-title{margin-top:14px;font-size:18px;font-weight:500;line-height:1.25}
  .hero-today .hero-sub{margin-top:6px;font-size:12.5px;color:var(--text-on-dark-dim)}
  .hero-today .hero-chip{display:inline-block;margin-top:14px;background:rgba(0,229,160,.15);color:var(--gold);padding:7px 12px;border-radius:999px;font-size:12px;font-weight:500;border:1px solid rgba(0,229,160,.3)}
  .hero-today.empty .hero-title{font-size:22px;margin-top:16px}
  .hero-today.last .hero-chip{background:transparent;border-color:rgba(247,244,236,.2);color:var(--text-on-dark-dim)}

  /* Грид вес+тренировки */
  .today-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .t-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px 16px;display:block;text-align:left;cursor:pointer;width:100%}
  .t-card:hover{border-color:var(--text-tertiary)}
  .t-card .tc-label{font-size:10.5px;letter-spacing:.3px;color:var(--text-secondary);text-transform:uppercase;font-weight:500}
  .t-card .tc-main{margin-top:10px;display:flex;align-items:baseline;gap:8px}
  .t-card .tc-v{font-size:24px;font-weight:500;letter-spacing:-.8px;font-feature-settings:"tnum" 1}
  .t-card .tc-v sup{font-size:12px;margin-left:2px;color:var(--text-secondary);font-weight:500}
  .t-card .tc-unit{font-size:12px;color:var(--text-secondary)}
  .t-card .tc-delta{font-size:12.5px;font-weight:500;padding:2px 8px;border-radius:999px;font-feature-settings:"tnum" 1}
  .t-card .tc-delta.ok{background:#e0f0e6;color:var(--success)}
  .t-card .tc-delta.warn{background:#fdf4e0;color:#a07508}
  .t-card .tc-delta.bad{background:#fce5e5;color:var(--danger)}
  .t-card .tc-sub{margin-top:4px;font-size:11.5px;color:var(--text-tertiary)}
  .t-card.weight.ok{border-left:3px solid var(--success)}
  .t-card.weight.warn{border-left:3px solid #d4a43b}
  .t-card.weight.bad{border-left:3px solid var(--danger)}

  /* Фокус */
  .focus{margin-top:18px;background:var(--bg-dark);color:var(--text-on-dark);border-radius:var(--r-md);padding:16px 18px}
  .focus .label{color:var(--gold)!important}
  .focus .row .label:last-child{color:var(--text-on-dark-dim)!important}
  .focus-list{margin-top:12px;display:flex;flex-direction:column;gap:8px}
  .focus .f-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(247,244,236,.08)}
  .focus .f-item:last-child{border-bottom:none}
  .focus .f-t{font-size:14px;font-weight:500}
  .focus .f-c{font-size:11.5px;color:var(--text-on-dark-dim)}

  /* Компактные stats */
  .stats-row.compact{display:grid;grid-template-columns:repeat(4,1fr);margin-top:20px;gap:8px;padding:14px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
  .stats-row.compact .stat{gap:4px}
  .stats-row.compact .stat .v{font-size:19px;letter-spacing:-.6px}
  .stats-row.compact .stat .k{font-size:9.5px;letter-spacing:.2px}
  @media (min-width:1024px){.stats-row.compact{max-width:560px}}

  /* Timeline */
  .timeline{margin-top:20px}
  .tl-list{margin-top:10px;display:flex;flex-direction:column;gap:4px}
  .tl-row{display:flex;align-items:center;gap:12px;padding:12px 10px;border-radius:10px;cursor:pointer}
  .tl-row:hover{background:var(--bg-subtle)}
  .tl-date{flex:0 0 40px;text-align:center}
  .tl-date .tl-d{font-size:17px;font-weight:500;letter-spacing:-.5px;line-height:1;font-feature-settings:"tnum" 1}
  .tl-date .tl-m{font-size:10px;text-transform:uppercase;color:var(--text-secondary);margin-top:3px;letter-spacing:.2px;font-weight:500}
  .tl-main{flex:1;min-width:0}
  .tl-main .tl-t{font-size:13.5px;font-weight:500}
  .tl-main .tl-s{font-size:11.5px;color:var(--text-secondary);margin-top:2px}
  .tl-r{flex:0 0 auto}
  .tl-place{font-size:20px;font-weight:500;font-feature-settings:"tnum" 1;text-align:right}
  .tl-place.gold{color:var(--gold)} .tl-place.silver{color:var(--silver)} .tl-place.bronze{color:var(--bronze)}
  .tl-up{font-size:18px;color:var(--gold);opacity:.6}

  /* Голосовой ввод */
  .voice-btn{position:absolute;right:10px;bottom:10px;width:32px;height:32px;border-radius:999px;background:var(--bg-primary);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
  .voice-btn:hover{border-color:var(--text-primary)}
  .voice-btn.rec{background:var(--danger);border-color:var(--danger)}
  .voice-btn.rec svg{stroke:#fff}
  .voice-btn svg{width:14px;height:14px;stroke:var(--text-secondary);stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .note{position:relative}
  .note .bar{top:14px!important}

  .empty-state{padding:32px 12px;text-align:center;color:var(--text-secondary)}
  .empty-state .e-icon{width:56px;height:56px;margin:0 auto 14px;opacity:.4}
  .empty-state .e-icon svg{width:100%;height:100%}
  .empty-state .e-title{font-size:15px;color:var(--text-primary);margin-bottom:6px;font-weight:500}
  .empty-state .e-sub{font-size:13px;line-height:1.5}

  .tabs{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--border);background:var(--bg-secondary);padding:10px 0 calc(10px + env(safe-area-inset-bottom));flex-shrink:0}
  .tabs .tab{padding:6px 0;text-align:center;font-size:11.5px;color:var(--text-secondary);position:relative}
  .tabs .tab.on{color:var(--accent);font-weight:500}
  .tabs .tab.on::before{content:"";position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:999px;background:var(--accent)}

  .fab{position:absolute;right:20px;bottom:88px;width:56px;height:56px;border-radius:999px;background:var(--accent);color:#0a1420;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:400;box-shadow:0 8px 24px -6px rgba(0,0,0,.6),0 0 0 4px rgba(0,229,160,.1);z-index:5}
  .fab:active{transform:scale(.96)}

  /* Турниры */
  .event-group{margin-top:18px}
  .event-card{display:flex;gap:14px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--r-md);padding:14px;margin-bottom:10px;cursor:pointer}
  .event-card:active{background:var(--bg-subtle)}
  .event-card .date{flex:0 0 44px;text-align:center}
  .event-card .date .d{font-size:22px;font-weight:500;letter-spacing:-.8px;line-height:1;font-feature-settings:"tnum" 1}
  .event-card .date .m{font-size:10px;text-transform:uppercase;color:var(--text-secondary);margin-top:4px;letter-spacing:.3px;font-weight:500}
  .event-card .main{flex:1;min-width:0}
  .event-card .t{font-size:14.5px;font-weight:500;line-height:1.25}
  .event-card .s{font-size:12px;color:var(--text-secondary);margin-top:3px}
  .event-card .r{flex:0 0 auto;text-align:right}
  .event-card .r .place{font-size:20px;font-weight:500;font-feature-settings:"tnum" 1}
  .event-card .r .place.gold{color:var(--gold)} .event-card .r .place.silver{color:var(--silver)} .event-card .r .place.bronze{color:var(--bronze)}
  .event-card .r .score{font-size:11px;color:var(--text-secondary);margin-top:2px}

  /* Календарь */
  .cal-year-label{display:flex;justify-content:space-between;align-items:center;margin-top:22px}
  .cal-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}
  @media (min-width:768px){.cal-grid{grid-template-columns:repeat(3,1fr)}}
  @media (min-width:1024px){.cal-grid{grid-template-columns:repeat(4,1fr)}}
  .cal-cell{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px;min-height:80px}
  .cal-cell.filled{background:var(--bg-dark);color:var(--text-on-dark);border-color:var(--bg-dark)}
  .cal-cell .cal-m{font-size:11px;letter-spacing:.3px;text-transform:uppercase;font-weight:500;color:var(--text-secondary);margin-bottom:10px}
  .cal-cell.filled .cal-m{color:var(--text-on-dark-dim)}
  .cal-cell .cal-dots{display:flex;gap:5px;flex-wrap:wrap;min-height:10px}
  .cal-cell .cdot{width:8px;height:8px;border-radius:999px;background:var(--text-secondary);cursor:pointer}
  .cal-cell .cdot.g{background:var(--gold)}
  .cal-cell .cdot.s{background:var(--silver)}
  .cal-cell .cdot.b{background:var(--bronze)}
  .cal-cell .cdot.up{background:transparent;border:1.5px solid var(--gold)}
  .cal-cell .cdot.n{background:var(--text-tertiary)}
  .cal-cell .cal-list{margin-top:10px;display:flex;flex-direction:column;gap:4px}
  .cal-cell .cal-li{font-size:11.5px;line-height:1.3;cursor:pointer;display:flex;gap:6px}
  .cal-cell .cal-li span{color:var(--text-tertiary);font-feature-settings:"tnum" 1}
  .cal-cell.filled .cal-li span{color:var(--text-on-dark-dim)}
  .cal-cell .cal-li:hover{opacity:.7}

  /* Ближайший турнир */
  .next-event{margin-top:28px;background:var(--bg-dark);color:var(--text-on-dark);border-radius:var(--r-md);padding:18px 22px;position:relative;overflow:hidden}
  .next-event::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;background:var(--gold);border-radius:0 2px 2px 0}
  .next-event .nev-title{font-size:16px;font-weight:500;margin-top:8px}
  .next-event .nev-sub{font-size:12.5px;color:var(--text-on-dark-dim);margin-top:4px}

  h1.event-title{font-size:24px;font-weight:500;letter-spacing:-.6px;margin:8px 0;line-height:1.2}
  .event-sub{font-size:13.5px;color:var(--text-secondary)}
  .date-label{margin-top:24px}

  .hero{margin-top:18px;background:var(--bg-dark);color:var(--text-on-dark);border-radius:var(--r-lg);padding:20px 22px;position:relative;overflow:hidden;min-height:160px}
  .hero .badge{font-size:10.5px;letter-spacing:1px;font-weight:500;text-transform:uppercase;color:var(--gold)}
  .hero .place{display:flex;align-items:baseline;gap:10px;margin-top:18px}
  .hero .place .n{font-size:68px;line-height:.9;font-weight:500;letter-spacing:-4px;font-feature-settings:"tnum" 1}
  .hero .place .l{font-size:13px;letter-spacing:.3px;font-weight:500;text-transform:uppercase}
  .hero .medal-text{margin-top:10px;font-size:16px;font-weight:500}
  .hero .meta{margin-top:3px;font-size:12px;color:var(--text-on-dark-dim)}
  .hero .ring{position:absolute;right:-60px;top:-60px;width:200px;height:200px;border-radius:999px;border:1.5px solid rgba(0,229,160,.35)}
  .hero .ring::after{content:"";position:absolute;inset:30px;border-radius:999px;border:1.5px solid rgba(0,229,160,.18)}
  .hero.pending .n{font-size:22px;letter-spacing:-.5px}

  .two-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .mini-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px}
  .mini-card .k{font-size:10.5px;letter-spacing:.3px;color:var(--text-secondary);text-transform:uppercase;font-weight:500}
  .mini-card .v{margin-top:10px;font-size:24px;font-weight:500;letter-spacing:-.8px;font-feature-settings:"tnum" 1}
  .mini-card .v sup{font-size:12px;font-weight:500;margin-left:1px;color:var(--text-secondary)}
  .mini-card .sub{margin-top:4px;font-size:12px;color:var(--text-secondary)}

  .bracket-label{margin-top:22px;display:flex;justify-content:space-between;align-items:center}
  .bracket-label button{font-size:12.5px;font-weight:500}
  .bracket{display:flex;flex-direction:column;gap:9px;margin-top:12px}
  .fight{display:flex;align-items:center;gap:12px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--r-md);padding:11px;cursor:pointer}
  .fight:active{background:var(--bg-subtle)}
  .fight .no{flex:0 0 42px;height:42px;border-radius:10px;background:var(--bg-dark);color:var(--text-on-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9.5px;letter-spacing:.3px;text-transform:uppercase;line-height:1.1;font-weight:500}
  .fight .no b{font-size:13px;font-weight:500}
  .fight .info{flex:1;min-width:0}
  .fight .info .op{font-size:13.5px;font-weight:500}
  .fight .info .r{font-size:12px;color:var(--text-secondary);margin-top:2px}
  .fight .mark{flex:0 0 26px;height:26px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500}
  .fight .mark.w{background:var(--gold-soft);color:#0a1420}
  .fight .mark.l,.fight .mark.d{background:var(--bg-subtle);color:#5a5a52}
  .fight.final{background:var(--bg-dark);border-color:var(--bg-dark);color:var(--text-on-dark)}
  .fight.final .no{background:var(--gold-soft);color:#0a1420}
  .fight.final .info .op,.fight.final .info .r{color:var(--gold)}

  /* Разбор */
  .kicker{margin-top:24px;font-size:11px;letter-spacing:.3px;text-transform:uppercase;color:var(--text-secondary);font-weight:500}
  h1.opp{font-size:22px;font-weight:500;letter-spacing:-.4px;margin-top:10px;line-height:1.2}
  .opp-sub{margin-top:6px;font-size:13.5px;color:var(--text-secondary)}

  .tags{margin-top:12px;display:flex;flex-wrap:wrap;gap:8px}
  .tag{background:var(--bg-dark);color:var(--text-on-dark);border-radius:999px;padding:9px 14px;font-size:12.5px;font-weight:500;display:inline-flex;align-items:center;gap:6px}
  .tag .x{opacity:.5;cursor:pointer;font-size:14px;line-height:1}
  .tag.add{background:transparent;color:var(--text-secondary);border:1px dashed var(--border);cursor:pointer}

  .note{margin-top:12px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px;position:relative}
  .note .bar{position:absolute;left:14px;top:17px;width:3px;height:12px;border-radius:2px}
  .note .head{padding-left:14px;font-size:10.5px;letter-spacing:.3px;text-transform:uppercase;font-weight:500}
  .note.ok .bar{background:var(--success)}.note.ok .head{color:var(--success)}
  .note.bad .bar{background:var(--danger)}.note.bad .head{color:var(--danger)}
  .note textarea{width:100%;margin-top:10px;border:none;background:transparent;font-size:13.5px;line-height:1.5;color:var(--text-primary);outline:none;resize:vertical;min-height:60px;font-family:inherit;padding:0}

  .repeat{margin-top:12px;background:var(--bg-dark);color:var(--text-on-dark);border-radius:var(--r-md);padding:16px 18px}
  .repeat .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .repeat .head{font-size:11px;letter-spacing:.3px;text-transform:uppercase;font-weight:500;color:var(--gold)}
  .repeat .count{font-size:11px;color:var(--text-on-dark-dim);text-align:right;line-height:1.25}
  .repeat p{margin-top:12px;font-size:13.5px;line-height:1.5}

  /* Дневник */
  .review-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--r-md);padding:14px;margin-bottom:10px;cursor:pointer}
  .review-card .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
  .review-card .top .d,.review-card .top .r{font-size:11px;color:var(--text-secondary)}
  .review-card .t{font-size:14.5px;font-weight:500}
  .review-card .s{font-size:12.5px;color:var(--text-secondary);margin-top:4px;line-height:1.4}
  .review-card .tags{margin-top:8px} .review-card .tags .tag{padding:6px 10px;font-size:11.5px}

  /* Статы */
  .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .kpi{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--r-md);padding:14px}
  .kpi .k{font-size:10.5px;letter-spacing:.3px;color:var(--text-secondary);text-transform:uppercase;font-weight:500}
  .kpi .v{margin-top:10px;font-size:24px;font-weight:500;letter-spacing:-.8px;font-feature-settings:"tnum" 1}
  .kpi .v sup{font-size:12px;margin-left:1px;color:var(--text-secondary)}

  .bars{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--r-md);padding:16px;margin-top:12px}
  .bars h3{font-size:11px;letter-spacing:.3px;text-transform:uppercase;color:var(--text-secondary);font-weight:500;margin-bottom:14px}
  .bars .bar-row{display:grid;grid-template-columns:100px 1fr 30px;gap:10px;align-items:center;margin-bottom:10px}
  .bars .bar-row:last-child{margin-bottom:0}
  .bars .bar-row .nm{font-size:12.5px}
  .bars .bar-row .tr{background:var(--bg-subtle);height:6px;border-radius:3px;overflow:hidden}
  .bars .bar-row .tr>div{height:100%;background:var(--bg-dark);border-radius:3px}
  .bars .bar-row .nu{text-align:right;font-size:12px;color:var(--text-secondary);font-feature-settings:"tnum" 1}

  /* Распределение мест */
  .place-stack{display:flex;height:28px;border-radius:6px;overflow:hidden;background:var(--bg-subtle);margin-bottom:12px}
  .place-stack .ps{display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:500;min-width:0}
  .place-stack .ps.g{background:var(--gold);color:#0a1420}
  .place-stack .ps.s{background:var(--silver);color:#0a1420}
  .place-stack .ps.b{background:var(--bronze);color:#fff}
  .place-stack .ps.n{background:#d1cdc0;color:#5a5a52}
  .place-stack .ps span{font-feature-settings:"tnum" 1}
  .place-legend{display:flex;flex-wrap:wrap;gap:10px 16px;font-size:11.5px;color:var(--text-secondary)}
  .place-legend span{display:inline-flex;align-items:center;gap:6px}
  .place-legend .dot{width:8px;height:8px;border-radius:999px}
  .place-legend .dot.g{background:var(--gold)}
  .place-legend .dot.s{background:var(--silver)}
  .place-legend .dot.b{background:var(--bronze)}
  .place-legend .dot.n{background:#d1cdc0}

  /* Частота по месяцам */
  .month-bars{display:flex;gap:6px;align-items:flex-end;height:100px;margin-top:4px}
  .month-bars .mb-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0}
  .month-bars .mb-wrap{position:relative;width:100%;display:flex;flex-direction:column;justify-content:flex-end}
  .month-bars .mb-bar{width:100%;border-radius:2px 2px 0 0}
  .month-bars .mb-bar.done{background:var(--bg-dark)}
  .month-bars .mb-bar.up{background:transparent;border:1px dashed var(--gold);border-bottom:none}
  .month-bars .mb-m{font-size:9.5px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.2px}

  .insight{margin-top:14px;background:var(--bg-dark);color:var(--text-on-dark);border-radius:var(--r-md);padding:18px 22px 20px;position:relative;overflow:hidden}
  .insight::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;background:var(--gold);border-radius:0 2px 2px 0}
  .insight .h{font-size:10.5px;letter-spacing:.3px;text-transform:uppercase;font-weight:500;color:var(--gold);margin-bottom:10px}
  .insight p{font-size:13.5px;line-height:1.6}

  /* Цитата дня */
  .quote-box{margin-top:18px;padding:14px 18px 14px 14px;border-left:2px solid var(--border);display:flex;gap:10px}
  .quote-box .q-mark{font-size:28px;color:var(--gold);line-height:1;font-family:Georgia,serif;margin-top:-4px;opacity:.6}
  .quote-box .q-text{font-style:italic;font-size:13.5px;line-height:1.55;color:var(--text-primary);letter-spacing:-.05px}
  .quote-box .q-author{margin-top:6px;font-size:11.5px;color:var(--text-secondary)}
  .quote-box > div:nth-child(2){flex:1}

  /* Цель на турнир */
  .goal-box{margin-top:18px;border-radius:var(--r-md);padding:14px 18px;background:var(--bg-secondary);border:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
  .goal-box .gb-label{font-size:10.5px;letter-spacing:.3px;text-transform:uppercase;color:var(--text-secondary);font-weight:500}
  .goal-box .gb-main{font-size:16px;font-weight:500;margin-top:4px}
  .goal-box .gb-status{font-size:11.5px;color:var(--text-secondary);padding:4px 10px;border-radius:999px;background:var(--bg-subtle);font-weight:500;flex-shrink:0}
  .goal-box.achieved{border-color:var(--success);background:#edf6f1}
  .goal-box.achieved .gb-status{background:var(--success);color:#fff}
  .goal-box.missed{border-color:var(--danger);background:#fbeeee}
  .goal-box.missed .gb-status{background:var(--danger);color:#fff}
  .goal-box.pending .gb-status{background:var(--gold);color:#0a1420}

  /* Раздел Тренировки */
  .streak-big{background:var(--bg-dark);color:var(--text-on-dark);border-radius:var(--r-lg);padding:24px 24px 22px;text-align:left;position:relative;overflow:hidden}
  .streak-big::before{content:"";position:absolute;left:0;top:20px;bottom:20px;width:3px;background:var(--gold);border-radius:0 2px 2px 0}
  .streak-big .sb-label{font-size:10.5px;letter-spacing:.3px;text-transform:uppercase;color:var(--gold);font-weight:500}
  .streak-big .sb-value{font-size:68px;font-weight:500;letter-spacing:-3px;line-height:.9;margin-top:10px;font-feature-settings:"tnum" 1}
  .streak-big .sb-unit{font-size:13px;color:var(--text-on-dark-dim);margin-top:6px}
  .streak-big .btn-primary{background:var(--gold);color:#0a1420}

  .day-bars{display:flex;gap:3px;align-items:flex-end;height:52px;margin-top:10px}
  .day-bars .db-col{flex:1;min-width:0}
  .day-bars .db-wrap{position:relative;height:44px;display:flex;flex-direction:column;justify-content:flex-end}
  .day-bars .db-bar{width:100%;background:var(--bg-dark);border-radius:2px 2px 0 0;min-height:2px}

  .tr-history{display:flex;flex-direction:column;gap:8px;margin-top:10px}
  .tr-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 14px}
  .tr-row-l{display:flex;align-items:center;gap:12px}
  .tr-badge{width:32px;height:32px;border-radius:8px;background:var(--bg-dark);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500}
  .tr-row .tr-t{font-size:13.5px;font-weight:500}
  .tr-row .tr-s{font-size:11.5px;color:var(--text-secondary);margin-top:2px}
  .tr-row .tr-feel{font-size:16px;font-weight:500;font-feature-settings:"tnum" 1}
  .tr-row .tr-feel span{font-size:11px;color:var(--text-tertiary);margin-left:1px}

  /* Раздел Вес */
  .w-history{display:flex;flex-direction:column;gap:4px;margin-top:10px}
  .w-row{display:grid;grid-template-columns:80px 1fr auto;gap:10px;align-items:center;padding:10px 12px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--r-md);cursor:pointer}
  .w-row .w-d{font-size:12px;color:var(--text-secondary)}
  .w-row .w-v{font-size:16px;font-weight:500;letter-spacing:-.3px}
  .w-row .w-v sup{font-size:10px;color:var(--text-secondary);font-weight:500;margin-left:1px}
  .w-row .w-dlt{font-size:11.5px;font-weight:500;padding:3px 9px;border-radius:999px;font-feature-settings:"tnum" 1}
  .w-row .w-dlt.ok{background:#e0f0e6;color:var(--success)}
  .w-row .w-dlt.warn{background:#fdf4e0;color:#a07508}
  .w-row .w-dlt.bad{background:#fce5e5;color:var(--danger)}

  /* Соперники */
  .op-list{display:flex;flex-direction:column;gap:8px}
  @media (min-width:1024px){.op-list{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}}
  .op-card{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 16px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--r-md);cursor:pointer;transition:border-color .1s}
  .op-card:hover{border-color:var(--text-primary)}
  .op-main{flex:1;min-width:0}
  .op-n{font-size:14px;font-weight:500}
  .op-s{font-size:11.5px;color:var(--text-secondary);margin-top:2px}
  .op-score{font-size:17px;font-weight:500;letter-spacing:-.4px;font-feature-settings:"tnum" 1}
  .op-score.win{color:var(--success)}
  .op-score.loss{color:var(--danger)}
  .op-score.draw{color:var(--text-secondary)}

  /* Соперники — карточки с формой и реваншем */
  .op-card{display:flex;flex-direction:column;gap:8px;padding:14px 16px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--r-md);cursor:pointer;transition:border-color .1s}
  .op-card:hover{border-color:var(--text-secondary)}
  .op-card.rematch{background:var(--bg-card);border-color:var(--accent)}
  .op-card.rematch::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;background:var(--accent);border-radius:0 2px 2px 0}
  .op-card{position:relative}
  .op-row{display:flex;align-items:center;justify-content:space-between;gap:14px}

  @keyframes in{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
</style>

function eventGoalStatus(e){
  if(!e.goal||!e.goal.type) return null;
  if(e.status==='upcoming') return 'pending';
  if(e.goal.type==='gold') return e.place===1?'achieved':'missed';
  if(e.goal.type==='top3') return (e.place&&e.place<=3)?'achieved':'missed';
  if(e.goal.type==='bracket') return (e.place&&e.place<=4)?'achieved':'missed';
  if(e.goal.type==='experience') return 'achieved';
  return 'pending';
}

/* Ресайз изображения до квадратного аватара (256×256) и получение dataURL */
function resizeImage(file,size=256){
  return new Promise((resolve,reject)=>{
    const fr=new FileReader();
    fr.onerror=reject;
    fr.onload=()=>{
      const img=new Image();
      img.onerror=reject;
      img.onload=()=>{
        const s=Math.min(img.width,img.height);
        const sx=(img.width-s)/2, sy=(img.height-s)/2;
        const c=document.createElement('canvas');
        c.width=size; c.height=size;
        c.getContext('2d').drawImage(img,sx,sy,s,s,0,0,size,size);
        resolve(c.toDataURL('image/jpeg',0.82));
      };
      img.src=fr.result;
    };
    fr.readAsDataURL(file);
  });
}

}

/* Streak тренировок: подряд идущие дни с тренировками, начиная с сегодня */
function trainingStreak(){
  const dates=new Set(state.trainings.map(t=>t.date));
  let streak=0;
  const today=new Date();
  today.setHours(0,0,0,0);
  for(let i=0;i<365;i++){
    const d=new Date(today);d.setDate(today.getDate()-i);
    const iso=d.toISOString().slice(0,10);
    if(dates.has(iso)) streak++;
    else if(i>0) break; // если сегодня ещё не тренировался — streak не обнуляем, но и не увеличиваем
  }
  return streak;
}

}
function repeatingTags(excl,N=3){const s=allFightsSorted().filter(f=>f.id!==excl).slice(0,N);if(s.length<N)return[];const c={};s.forEach(f=>(f.tags||[]).forEach(t=>c[t]=(c[t]||0)+1));return Object.entries(c).filter(([,k])=>k>=N).map(([t])=>t)}

function athleteCardHtml(a){
  const p=a.profile||{};

function viewCalendar(all){
  const year = new Date().getFullYear();
  const yearEvents = all.filter(e=>new Date(e.date).getFullYear()===year);
  const byMonth = {};
  yearEvents.forEach(e=>{const m=new Date(e.date).getMonth();(byMonth[m]=byMonth[m]||[]).push(e)});
  return `<div class="cal-year-label" style="margin-top:18px"><div class="label">${year}</div><div class="label" style="text-transform:none;letter-spacing:.2px">${yearEvents.length} ${plural(yearEvents.length,'турнир','турнира','турниров')}</div></div>
  <div class="cal-grid">
    ${Array.from({length:12},(_,i)=>{
      const es=byMonth[i]||[];
      const hasAny=es.length>0;
      return `<div class="cal-cell ${hasAny?'filled':''}">
        <div class="cal-m">${MONTHS_F[i]}</div>
        <div class="cal-dots">
          ${es.map(e=>{
            const cls=e.status==='upcoming'?'up':(e.place===1?'g':e.place===2?'s':e.place===3?'b':'n');
            return `<span class="cdot ${cls}" title="${esc(e.title)}" data-go-event="${e.id}"></span>`;
          }).join('')}
        </div>
        ${es.length?`<div class="cal-list">${es.map(e=>`<div class="cal-li" data-go-event="${e.id}"><span>${new Date(e.date).getDate()}</span>${esc(e.title)}</div>`).join('')}</div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}
function daysUntil(iso){
  const d=Math.ceil((new Date(iso).getTime()-Date.now())/86400000);
  if(d<0) return 'прошёл';
  if(d===0) return 'сегодня';
  return 'через '+d+' '+plural(d,'день','дня','дней');
}
function eventCard(e){

    <div class="date"><div class="d num">${fmtDay(e.date)}</div><div class="m">${fmtMon(e.date)}</div></div>

}

function fightRow(f){

  let line='';if(f.result)line=resultName(f.result);
  if(f.method)line+=(line?' · ':'')+methodName(f.method).toLowerCase().replace('нокаут (ko)','КО').replace('тех. нокаут (tko)','ТКО').replace('решение: ','решение ');

}

/* SVG-график динамики веса */
function weightChart(pts){
  const W=300,H=120,pad={l:28,r:12,t:12,b:22};
  const cat = pts[pts.length-1].cat;
  const all=pts.map(p=>p.w).concat([cat]);
  const minW=Math.floor(Math.min(...all)-1), maxW=Math.ceil(Math.max(...all)+1);
  const rng=Math.max(1,maxW-minW);
  const x=(i)=>pad.l+(i/(pts.length-1||1))*(W-pad.l-pad.r);
  const y=(w)=>pad.t+(1-(w-minW)/rng)*(H-pad.t-pad.b);
  const poly = pts.map((p,i)=>`${x(i).toFixed(1)},${y(p.w).toFixed(1)}`).join(' ');
  const catY=y(cat);
  const last=pts[pts.length-1];
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto" xmlns="http://www.w3.org/2000/svg">
    <line x1="${pad.l}" y1="${catY}" x2="${W-pad.r}" y2="${catY}" stroke="#00e5a0" stroke-width="1" stroke-dasharray="4 3" opacity=".7"/>
    <text x="${W-pad.r}" y="${catY-4}" font-size="9" fill="#00e5a0" text-anchor="end" font-family="Inter">лимит ${fmtN(cat)}</text>
    <text x="4" y="${pad.t+8}" font-size="9" fill="#7a8a9a" font-family="Inter">${fmtN(maxW)}</text>
    <text x="4" y="${H-pad.b+4}" font-size="9" fill="#7a8a9a" font-family="Inter">${fmtN(minW)}</text>
    <polyline points="${poly}" fill="none" stroke="#e8eef5" stroke-width="1.6" stroke-linejoin="round"/>
    ${pts.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.w).toFixed(1)}" r="${i===pts.length-1?3.2:2.2}" fill="${i===pts.length-1?'#d4af37':'#1a1a1a'}"/>`).join('')}
    <text x="${x(pts.length-1)}" y="${y(last.w)-7}" font-size="10" fill="#e8eef5" text-anchor="middle" font-family="Inter" font-weight="500">${fmtN(last.w)}</text>
  </svg>`;
}
function insight(){
  // Возвращает топ-1 инсайт по приоритету. Пустая строка — если карьера слишком короткая.
  const candidates=[];
  const rec=allFightsSorted().slice(0,10);
  const r=record();

  // 5: Вес на пределе категории
  const last4=state.events.filter(e=>e.weighIn&&e.weightKg).slice(-4);
  if(last4.length>=3){
    const hit=last4.filter(e=>Number(e.weighIn)/Number(e.weightKg)>=0.99).length;
    if(hit>=3){
      const avgW=last4.reduce((s,e)=>s+Number(e.weighIn),0)/last4.length;
      const cat=last4[last4.length-1].weightKg;
      const nextCat=WEIGHT_CATS.find(w=>w>cat)||cat;
      const sag=Math.max(0,cat-avgW+1).toFixed(1).replace('.',',');
      candidates.push({p:5,t:`Ты на пределе категории. Средний вес ${fmtN(avgW)} кг — рассмотри переход в до ${fmtN(nextCat)} кг, чтобы не сгонять ${sag} кг перед боями.`});
    }
  }

  // 5: Повторяющийся тег в 3+ последних боях
  const tagC={};allFightsSorted().slice(0,5).forEach(f=>(f.tags||[]).forEach(t=>tagC[t]=(tagC[t]||0)+1));
  const hotTag=Object.entries(tagC).sort((a,b)=>b[1]-a[1])[0];
  if(hotTag && hotTag[1]>=3) candidates.push({p:5,t:`«${hotTag[0]}» — отмечал в последних ${hotTag[1]} боях. Поднять приоритет на тренировках.`});

  // 4: Winrate на уровне < 50%
  const la={};state.events.forEach(e=>{if(e.status==='upcoming')return;const fs=eventFights(e.id),w=fs.filter(x=>x.result==='win').length;if(!la[e.level])la[e.level]={w:0,t:0,events:0};la[e.level].w+=w;la[e.level].t+=fs.length;la[e.level].events++});
  for(const [lv,d] of Object.entries(la)){
    if(d.events>=3 && d.t>0){
      const pct=Math.round(d.w/d.t*100);
      if(pct<50){candidates.push({p:4,t:`На уровне «${levelName(lv)}» winrate ${pct}%. Стоит больше выступать на уровне ниже, чтобы набрать форму.`});break}
    }
  }

  // 4: Серия поражений ≥ 2
  let ls=0;for(const f of rec){if(f.result==='loss')ls++;else break}
  if(ls>=2) candidates.push({p:4,t:`${ls} поражения подряд. Стоит пересмотреть подготовку — посмотри «повторяющиеся ошибки» в дневнике.`});

  // 3: Пауза > 3 мес
  const dn=state.events.filter(e=>e.status!=='upcoming').sort((a,b)=>b.date.localeCompare(a.date));
  if(dn.length){
    const days=Math.floor((Date.now()-new Date(dn[0].date).getTime())/86400000);
    if(days>90) candidates.push({p:3,t:`${Math.floor(days/30)} месяцев без выступлений. Лучшая форма обычно в первые 6 недель после турнира.`});
  }

  // 3: Серия побед ≥ 5
  let ws=0;for(const f of rec){if(f.result==='win')ws++;else break}
  if(ws>=5) candidates.push({p:3,t:`Серия из ${ws} побед подряд. Лучшая с начала карьеры!`});

  // 2: Скоро турнир
  const up=state.events.filter(e=>e.status==='upcoming').sort((a,b)=>a.date.localeCompare(b.date))[0];
  if(up){
    const days=Math.ceil((new Date(up.date).getTime()-Date.now())/86400000);
    if(days>=0&&days<14) candidates.push({p:2,t:`Турнир «${up.title}» через ${days} ${plural(days,'день','дня','дней')}. Запиши цель — это улучшает результат.`});
  }

  // 1: Нокаутёр
  const wins=state.fights.filter(f=>f.result==='win');
  const early=wins.filter(f=>f.method==='ko'||f.method==='tko').length;
  if(wins.length>=5 && early/wins.length>0.6){
    candidates.push({p:1,t:`${Math.round(early/wins.length*100)}% побед досрочно — ты нокаутёр. Стиль определяет тренировочный фокус.`});
  }

  if(!candidates.length){
    if(r.total<3) return '';
    return 'Всё идёт по плану. Продолжай фиксировать бои — чем больше данных, тем точнее выводы.';
  }
  candidates.sort((a,b)=>b.p-a.p);
  return candidates[0].t;
}

/* ===== Вес (отдельный раздел) ===== */
function viewWeight(){
  const cat=state.profile?.weightCategoryKg||75;
  const all=(state.weights||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
  const last90=all.filter(w=>{const d=new Date(w.date);return d>=new Date(Date.now()-90*86400000)});

  const today=todayISO();
  const existingToday=all.find(w=>w.date===today);
  const last=all[all.length-1]||null;
  const avg7 = (()=>{const a=all.slice(-7);return a.length?a.reduce((s,x)=>s+x.kg,0)/a.length:null})();
  const min30 = (()=>{const a=all.slice(-30);return a.length?Math.min(...a.map(x=>x.kg)):null})();
  const delta = last?last.kg-cat:null;

  // План сгонки перед ближайшим турниром
  const nxt=nextEvent();
  let cutPlanHtml='';
  if(nxt && last && nxt.weighIn){
    const target=Number(nxt.weighIn);
    const days=Math.max(1,daysTo(nxt.date));
    const toCut=last.kg-target;
    if(toCut>0.3){
      cutPlanHtml=`<div class="insight" style="margin-top:14px"><div class="h">План сгонки</div><p>До «${esc(nxt.title)}» — ${days} ${plural(days,'день','дня','дней')}. Сейчас ${fmtN(last.kg)} кг, цель на взвешивании ${fmtN(target)} кг. Нужно скинуть <b>${fmtN(toCut)} кг</b> — по ${fmtN(toCut/days)} кг/день.</p></div>`;
    }
  }

  return `${sbar()}
    <h1 class="name" style="font-size:24px">Вес</h1>
    <div class="subtitle">Лимит категории ${fmtN(cat)} кг</div>

    <form id="weight-inline" style="margin-top:14px;display:flex;gap:8px;align-items:flex-end">
      <div class="field" style="flex:1;margin-bottom:0"><label>Сегодня, ${fmtDateShort(today)}</label><input name="kg" type="text" inputmode="decimal" placeholder="${last?fmtN(last.kg):fmtN(cat+3)}" value="${existingToday?fmtN(existingToday.kg):''}"/></div>
      <button type="submit" class="btn btn-primary" style="max-width:120px;height:46px">Записать</button>
    </form>

    <div class="kpi-grid" style="margin-top:14px">
      <div class="kpi"><div class="k">Текущий</div><div class="v num">${last?fmtN(last.kg):'—'}${last?'<sup>кг</sup>':''}</div></div>
      <div class="kpi"><div class="k">Среднее 7д</div><div class="v num">${avg7?fmtN(avg7):'—'}${avg7?'<sup>кг</sup>':''}</div></div>
      <div class="kpi"><div class="k">Дельта к лимиту</div><div class="v num">${delta!=null?(delta>0?'+':'')+fmtN(delta):'—'}</div></div>
      <div class="kpi"><div class="k">Минимум 30д</div><div class="v num">${min30?fmtN(min30):'—'}${min30?'<sup>кг</sup>':''}</div></div>
    </div>

    ${cutPlanHtml}

    ${last90.length>=2 ? `
      <div class="bars" style="margin-top:14px"><h3>Динамика · 90 дней</h3>
        ${weightChart(last90.map(w=>({w:w.kg,cat,d:w.date})))}
      </div>
    ` : ''}

    <div class="label" style="margin-top:22px">История</div>
    ${all.length ? `
      <div class="w-history">
        ${all.slice().reverse().slice(0,30).map(w=>`<div class="w-row" data-w-edit="${w.id}"><span class="w-d">${fmtDateShort(w.date)}</span><span class="w-v num">${fmtN(w.kg)}<sup>кг</sup></span><span class="w-dlt ${w.kg<=cat?'ok':w.kg-cat<=2?'warn':'bad'}">${w.kg-cat>0?'+':''}${fmtN(w.kg-cat)}</span></div>`).join('')}
      </div>
    ` : `<div class="empty-state"><div class="e-sub">Нет записей. Заполни форму сверху.</div></div>`}
  `;
}

/* ===== Соперники ===== */
function normOpponentName(s){return (s||'').trim().toLowerCase().replace(/\s+/g,' ')}
function buildOpponents(){
  const map={};
  (state.fights||[]).forEach(f=>{
    const key=normOpponentName(f.opponentName);
    if(!key)return;
    if(!map[key]) map[key]={key,name:f.opponentName,club:f.opponentClub||'',city:f.opponentCity||'',hand:f.opponentHand||'',fights:[],wins:0,losses:0,draws:0};
    const o=map[key];
    o.fights.push(f);
    if(f.result==='win')o.wins++;
    else if(f.result==='loss')o.losses++;
    else if(f.result==='draw')o.draws++;
    if(f.opponentClub) o.club=f.opponentClub;
    if(f.opponentCity) o.city=f.opponentCity;
    if(f.opponentHand) o.hand=f.opponentHand;
  });
  // Реванши: соперники с предстоящим боем (ищем в предстоящих турнирах) — упрощённо: считаем «реваншем» любого соперника с 2+ боями
  return Object.values(map).sort((a,b)=>b.fights.length-a.fights.length);
}
function viewOpponents(){
  const q=state.route.params.q||'';
  const all=buildOpponents();
  const list=q ? all.filter(o=>o.name.toLowerCase().includes(q.toLowerCase())||(o.club||'').toLowerCase().includes(q.toLowerCase())) : all;
  const lefties=all.filter(o=>o.hand==='left').length;
  // Реванши: соперники с предстоящим турниром (есть их имя в будущих fights)
  const upcomingIds=state.events.filter(e=>e.status==='upcoming').map(e=>e.id);
  const revanshCount=all.filter(o=>state.fights.some(f=>upcomingIds.includes(f.eventId)&&normOpponentName(f.opponentName)===o.key)).length || all.filter(o=>o.fights.length>=2).length;

  // Карточка с реваншем (упреждающая)
  const revMap={};
  state.fights.forEach(f=>{
    if(!upcomingIds.includes(f.eventId))return;
    const k=normOpponentName(f.opponentName);if(!k)return;
    const ev=state.events.find(e=>e.id===f.eventId);
    const days=ev?daysTo(ev.date):null;
    revMap[k]={eventTitle:ev?.title,days};
  });

  return `${sbar()}
    <div class="nav"><button class="back" data-back>←</button><span></span><button class="act" data-go="event-new">+</button></div>
    <div class="label" style="margin-top:10px">База</div>
    <h1 class="event-title" style="margin-top:4px">Соперники</h1>

    <form id="op-search" style="margin-top:16px"><div class="field" style="margin-bottom:0"><input name="q" placeholder="Поиск по имени или клубу" value="${esc(q)}"/></div></form>

    <div class="kpi-grid" style="margin-top:14px;grid-template-columns:repeat(3,1fr)">
      <div class="kpi"><div class="k">Всего</div><div class="v num">${all.length}</div></div>
      <div class="kpi"><div class="k">Левшей</div><div class="v num">${lefties}</div></div>
      <div class="kpi"><div class="k">Реванши</div><div class="v num">${revanshCount}</div></div>
    </div>

    ${list.length ? `
      <div class="op-list" style="margin-top:14px">
        ${list.map(o=>{
          const score=`${o.wins}–${o.losses}${o.draws?'–'+o.draws:''}`;
          const lead=o.wins>o.losses?'win':o.wins<o.losses?'loss':'draw';
          const note=state.opponentNotes[o.key]||'';
          const rematch=revMap[o.key];
          const formBars=o.fights.slice(-5).map(f=>`<span class="of-bar ${f.result==='win'?'w':f.result==='loss'?'l':'d'}"></span>`).join('');
          return `<div class="op-card ${rematch?'rematch':''}" data-go-opponent="${encodeURIComponent(o.key)}">
            <div class="op-row">
              <div class="op-main">
                <div class="op-n">${esc(o.name)}</div>
                <div class="op-s">${esc(o.club||'')}${o.club&&(o.city||o.hand)?' · ':''}${esc(o.city||'')}${o.hand?((o.club||o.city)?' · ':'')+handName(o.hand).toLowerCase():''}</div>
              </div>
              <div class="op-score ${lead}">${score}</div>
            </div>
            ${rematch?`<div class="op-rematch-label">Реванш ${rematch.days!=null?'через '+rematch.days+' '+plural(rematch.days,'день','дня','дней'):'скоро'}</div>`:''}
            ${rematch && note?`<div class="op-rematch-note">${esc(note)}</div>`:''}
            ${!rematch?`<div class="op-form-bars">${formBars||''}</div>`:''}
          </div>`;
        }).join('')}
      </div>
    ` : q ? `<div class="empty-state"><div class="e-sub">Никого не найдено.</div></div>` : `<div class="empty-state"><div class="e-icon">${medalIcon('#00e5a0')}</div><div class="e-title">Пока пусто</div><div class="e-sub">После первого боя соперники появятся здесь автоматически.</div></div>`}

    <div style="text-align:center;margin-top:28px;color:var(--text-tertiary);font-size:11px">База соперников</div>
  `;
}

      .stats .k{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
      table{width:100%;border-collapse:collapse;font-size:11px}

/* === Главный рендер === */
function render(){
  const app=document.getElementById('app'),sh=document.getElementById('shell');

  // 1. Если роль не выбрана — экран выбора
  if(state.role===null){
    app.innerHTML=viewRolePick();
    removeTabs();removeFab();
    renderSidebar();bind();return;
  }
  // 2. Тренер без профиля — онбординг тренера
  if(state.role==='coach' && !state.coach){
    app.innerHTML=viewCoachOnboarding();
    removeTabs();removeFab();
    renderSidebar();bind();return;
  }
  // 3. Спортсмен без профиля — онбординг спортсмена
  if(state.role==='athlete' && !state.profile){
    app.innerHTML=viewOnboarding();
    removeTabs();removeFab();
    renderSidebar();bind();return;
  }

  // Редирект старых маршрутов
  if(state.route.name==='profile') state.route={name:'dashboard',params:{}};
  // Дневник снова доступен из меню

  const r=state.route;let html='',tabs=true,fab=false;

  // Маршруты тренера
  if(r.name==='coach-dashboard'){html=viewCoachDashboard();tabs=true;fab=true}
  else if(r.name==='athlete-add'){html=viewAthleteAdd();tabs=false}
  // Маршруты спортсмена (и тренер в режиме просмотра спортсмена)
  else if(r.name==='dashboard'){
    if(state.role==='coach' && !currentAthlete()){html=viewCoachDashboard()}
    else html=viewProfile(); // viewProfile пока = Дашборд (переименуем позже)
  }
  else if(r.name==='events'){html=viewEvents();fab=(state.role!=='coach')}
  else if(r.name==='stats'){html=viewStats()}
  else if(r.name==='journal'){html=typeof viewJournal==='function'?viewJournal():'<div class="empty-state"><div class="e-sub">Журнал разборов — открывай из карточки боя.</div></div>'}
  else if(r.name==='goals'){html=viewGoals?viewGoals():viewGoalsStub()}
  else if(r.name==='season-goal'){html=viewSeasonGoal();tabs=false}
  else if(r.name==='season-goal-edit'){html=viewSeasonGoalEdit();tabs=false}
  else if(r.name==='pdf-export'){html=viewPdfExport();tabs=false}
  else if(r.name==='sparrings'){html='<div class="empty-state" style="margin-top:40px"><div class="e-title">Спарринги</div><div class="e-sub">Раздел готовится. Пока спарринги можно отмечать в «Тренировках» с типом «Спарринг».</div></div>'}
  else if(r.name==='reviews-queue'){html='<div class="empty-state" style="margin-top:40px"><div class="e-title">Очередь разборов</div><div class="e-sub">Показывает бои спортсменов без заполненного разбора. Скоро появится список.</div></div>'}
  else if(r.name==='trainings'){html=viewTrainings?viewTrainings():('<div class="empty-state">Раздел «Тренировки» — в следующем обновлении.</div>')}
  else if(r.name==='weight'){html=viewWeight?viewWeight():('<div class="empty-state">Раздел «Вес» — в следующем обновлении.</div>')}
  else if(r.name==='opponents'){html=viewOpponents?viewOpponents():('<div class="empty-state">Раздел «Соперники» — в следующем обновлении.</div>')}
  else if(r.name==='opponent'){html=viewOpponentDetail?viewOpponentDetail(r.params.name):'';tabs=false}
  else if(r.name==='event'){html=viewEventDetail(r.params.id);tabs=false}
  else if(r.name==='event-new'){html=viewEventForm('new');tabs=false}
  else if(r.name==='event-edit'){html=viewEventForm('edit',r.params.id);tabs=false}
  else if(r.name==='fight-new'){html=viewFightForm('new',{eventId:r.params.id});tabs=false}
  else if(r.name==='fight-edit'){html=viewFightForm('edit',{id:r.params.id});tabs=false}
  else if(r.name==='settings'){html=viewSettings();tabs=false}
  else html=viewProfile();

  app.innerHTML=html;
  tabs?addTabs():removeTabs();
  fab?addFab():removeFab();
  renderSidebar();
  bind();
}
function addTabs(){removeTabs();document.getElementById('shell').insertAdjacentHTML('beforeend',viewTabs());document.querySelectorAll('#shell .tabs .tab').forEach(b=>b.onclick=()=>go(b.dataset.tab))}
function removeTabs(){document.querySelectorAll('#shell .tabs').forEach(x=>x.remove())}
function addFab(target){
  removeFab();
  const t=target||(state.route.name==='coach-dashboard'?'athlete-add':'event-new');
  document.getElementById('shell').insertAdjacentHTML('beforeend','<button class="fab" id="fab">+</button>');
  document.getElementById('fab').onclick=()=>go(t);
}
function removeFab(){document.querySelectorAll('#shell .fab').forEach(x=>x.remove())}

/* === Биндеры === */
function bind(){
  const app=document.getElementById('app');
  app.querySelectorAll('[data-back]').forEach(b=>b.onclick=()=>history.length>1?history.back():go(state.role==='coach' && !currentAthlete()?'coach-dashboard':'dashboard'));

  // Выбор роли
  app.querySelectorAll('[data-pick-role]').forEach(b=>b.onclick=()=>{
    state.role=b.dataset.pickRole;
    save();
    render();
  });
  const roleDemo=document.getElementById('role-demo');
  if(roleDemo) roleDemo.onclick=()=>{
    loadDemoData();
    go('dashboard');

/* === Модалка / тост === */
function modal(t,txt,ok){const el=document.createElement('div');el.className='modal-bg';el.innerHTML=`<div class="modal"><h3>${esc(t)}</h3><p>${esc(txt)}</p><div class="actions"><button class="btn btn-danger" id="m-ok">Удалить</button><button class="btn btn-ghost" id="m-cancel">Отмена</button></div></div>`;document.body.appendChild(el);el.querySelector('#m-ok').onclick=()=>{el.remove();ok()};el.querySelector('#m-cancel').onclick=()=>el.remove();el.onclick=e=>{if(e.target===el)el.remove()}}
function toast(m){const el=document.createElement('div');el.className='toast';el.textContent=m;document.body.appendChild(el);setTimeout(()=>el.remove(),1800)}

/* === Модалка веса === */
function weightLogModal(){
  const today=todayISO();
  const existing = state.weights.find(w=>w.date===today);
  const last = latestWeight();
  const placeholder = existing?fmtN(existing.kg):(last?fmtN(last.kg):'74,8');
  const el=document.createElement('div');
  el.className='modal-bg';
  el.innerHTML=`<div class="modal">
    <h3>${existing?'Обновить вес':'Записать вес'}</h3>
    <p>Сегодня, ${fmtDateShort(today)}${last&&!existing?' · последний замер '+fmtN(last.kg)+' кг ('+fmtDateShort(last.date)+')':''}</p>
    <form id="w-form">
      <div class="field"><label>Вес, кг</label><input name="kg" type="text" inputmode="decimal" required autofocus value="${existing?fmtN(existing.kg):''}" placeholder="${placeholder}"/></div>
      <div class="actions"><button type="submit" class="btn btn-primary">Сохранить</button>${existing?'<button type="button" class="btn-subtle-danger" id="w-del">Удалить запись</button>':'<button type="button" class="btn btn-ghost" id="w-cancel">Отмена</button>'}</div>
    </form>
  </div>`;
  document.body.appendChild(el);
  el.onclick=e=>{if(e.target===el)el.remove()};
  const cancel=el.querySelector('#w-cancel');if(cancel)cancel.onclick=()=>el.remove();
  const del=el.querySelector('#w-del');if(del)del.onclick=()=>{state.weights=state.weights.filter(w=>w.date!==today);save();el.remove();render();toast('Удалено')};
  el.querySelector('#w-form').onsubmit=ev=>{
    ev.preventDefault();
    const kg=Number(String(new FormData(ev.target).get('kg')).replace(',','.'));
    if(!kg||kg<30||kg>200){toast('Некорректный вес');return}
    if(existing) existing.kg=kg;
    else state.weights.push({id:uid(),date:today,kg});
    save();el.remove();render();toast('Сохранено');
  };
}

/* === Модалка тренировки === */
const TRAIN_TYPES=[{v:'technique',n:'Техника',e:'Т'},{v:'sparring',n:'Спарринг',e:'С'},{v:'cardio',n:'Кардио',e:'К'},{v:'strength',n:'ОФП',e:'О'},{v:'recovery',n:'Восстан.',e:'В'}];
function trainingLogModal(){
  const today=todayISO();
  const today_trainings = state.trainings.filter(t=>t.date===today);
  const el=document.createElement('div');
  el.className='modal-bg';
  el.innerHTML=`<div class="modal">
    <h3>Тренировка</h3>
    <p>Сегодня, ${fmtDateShort(today)}${today_trainings.length?' · уже отмечено: '+today_trainings.length:''}</p>
    <form id="tr-form">
      <div class="field"><label>Тип</label>
        <div class="tr-types">${TRAIN_TYPES.map(t=>`<button type="button" class="tr-type" data-type="${t.v}"><span class="tr-e">${t.e}</span>${t.n}</button>`).join('')}</div>
        <input type="hidden" name="type" required/>
      </div>
      <div class="field-row">
        <div class="field"><label>Длительность, мин</label><input name="durationMin" type="number" min="10" max="360" value="90"/></div>
        <div class="field"><label>Ощущения 1–5</label>
          <select name="feel"><option value="3" selected>3 — норм</option><option value="5">5 — отлично</option><option value="4">4 — хорошо</option><option value="2">2 — так себе</option><option value="1">1 — тяжело</option></select>
        </div>
      </div>
      <div class="field"><label>Заметка (опц.)</label><input name="note" placeholder="Что отрабатывали"/></div>
      <div class="actions"><button type="submit" class="btn btn-primary">Записать</button><button type="button" class="btn btn-ghost" id="tr-cancel">Отмена</button></div>
    </form>
    ${today_trainings.length?`<div style="margin-top:14px"><div class="label">Сегодня</div>${today_trainings.map(t=>{const typ=TRAIN_TYPES.find(x=>x.v===t.type)||{n:t.type,e:'•'};return `<div class="tr-done"><span>${typ.e}</span> ${esc(typ.n)} · ${t.durationMin} мин${t.note?' · '+esc(t.note):''} <button class="x" data-del-tr="${t.id}">×</button></div>`}).join('')}</div>`:''}
  </div>`;
  document.body.appendChild(el);
  el.onclick=e=>{if(e.target===el)el.remove()};
  el.querySelector('#tr-cancel').onclick=()=>el.remove();
  const typeInput=el.querySelector('input[name="type"]');
  el.querySelectorAll('.tr-type').forEach(b=>b.onclick=()=>{el.querySelectorAll('.tr-type').forEach(x=>x.classList.remove('on'));b.classList.add('on');typeInput.value=b.dataset.type});
  el.querySelectorAll('[data-del-tr]').forEach(b=>b.onclick=()=>{state.trainings=state.trainings.filter(t=>t.id!==b.dataset.delTr);save();el.remove();render();toast('Удалено')});
  el.querySelector('#tr-form').onsubmit=ev=>{
    ev.preventDefault();
    const fd=new FormData(ev.target);
    if(!fd.get('type')){toast('Выбери тип');return}
    state.trainings.push({id:uid(),date:today,type:fd.get('type'),durationMin:Number(fd.get('durationMin'))||60,feel:Number(fd.get('feel'))||3,note:fd.get('note')||''});
    save();el.remove();render();toast('Записано');
  };
}

/* === Голосовой ввод === */
function attachVoiceInput(textarea){
  if(!window.SpeechRecognition && !window.webkitSpeechRecognition) return;
  const wrap = textarea.parentNode;
  if(!wrap || wrap.querySelector('.voice-btn')) return;
  wrap.style.position='relative';
  const btn=document.createElement('button');
  btn.type='button'; btn.className='voice-btn'; btn.title='Голосовой ввод';
  btn.innerHTML=`<svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10v2a7 7 0 0 0 14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>`;
  wrap.appendChild(btn);
  let rec=null, active=false;
  btn.onclick=()=>{
    if(active){try{rec.stop()}catch(e){}return}
    const R = window.SpeechRecognition || window.webkitSpeechRecognition;
    rec = new R();
    rec.lang='ru-RU'; rec.continuous=true; rec.interimResults=false;
    rec.onresult=e=>{
      let txt='';
      for(let i=e.resultIndex;i<e.results.length;i++) if(e.results[i].isFinal) txt+=e.results[i][0].transcript+' ';
      if(txt){textarea.value=(textarea.value?textarea.value+' ':'')+txt.trim(); textarea.dispatchEvent(new Event('input'))}
    };
    rec.onend=()=>{active=false;btn.classList.remove('rec')};
    rec.onerror=()=>{active=false;btn.classList.remove('rec');toast('Микрофон недоступен')};
    try{rec.start();active=true;btn.classList.add('rec')}catch(e){toast('Не удалось запустить')}
  };
}

/* Добавить демо-события в ТЕКУЩИЙ профиль (не трогая имя/спорт/весовую).
   Полезно когда уже онбордился, но хочется сразу наполнение. */
function appendDemoToCurrent(){
  const a=currentAthlete();
  if(!a){loadDemoData();return}
  const demoAth=JSON.parse(JSON.stringify(DEMO_DATA.athletes[0]));
  // Префиксируем ID чтобы не конфликтовали с возможно существующими
  const suffix='_'+uid();
  const remap={};
  demoAth.events.forEach(e=>{const nid=e.id+suffix;remap[e.id]=nid;e.id=nid});
  demoAth.fights.forEach(f=>{f.id=f.id+suffix;f.eventId=remap[f.eventId]||f.eventId});
  demoAth.weights.forEach(w=>{w.id=w.id+suffix});
  demoAth.trainings.forEach(t=>{t.id=t.id+suffix});

  a.events=(a.events||[]).concat(demoAth.events);
  a.fights=(a.fights||[]).concat(demoAth.fights);
  a.weights=(a.weights||[]).concat(demoAth.weights);
  a.trainings=(a.trainings||[]).concat(demoAth.trainings);
  a.opponentNotes=Object.assign({},a.opponentNotes||{},demoAth.opponentNotes||{});
  if(!a.seasonGoal && demoAth.seasonGoal) a.seasonGoal=demoAth.seasonGoal;
  syncFromAthlete();
  save();
}
