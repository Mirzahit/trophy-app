<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#1a1a1a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Trophy" />
<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="./icon-192.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="./icon-192.svg" />
<title>Trophy — дневник спортсмена</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg-primary:#f7f4ec; --bg-secondary:#ffffff; --bg-dark:#1a1a1a; --bg-subtle:#ebe7dd;
    --text-primary:#1a1a1a; --text-secondary:#8a8880; --text-tertiary:#a8a69c;
    --text-on-dark:#f7f4ec; --text-on-dark-dim:#a8a69c;
    --gold:#d4af37; --gold-soft:#c9a545; --silver:#b8b6b0; --bronze:#cd7f32;
    --success:#2d6a4f; --danger:#c94f4f; --border:#e6e1d5;
    --r-sm:10px; --r-md:14px; --r-lg:20px; --r-xl:28px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
  html,body{background:#0a0a0a;font-family:'Inter',system-ui,-apple-system,sans-serif;color:var(--text-primary);overscroll-behavior:none}
  body{min-height:100vh;display:flex;justify-content:center;align-items:stretch}
  button{font:inherit;cursor:pointer;border:none;background:none;color:inherit;text-align:left}
  input,textarea,select{font:inherit;color:inherit}
  a{color:inherit;text-decoration:none}

  /* Мобильный дефолт: фуллскрин, без рамки */
  body{background:var(--bg-primary)}
  #shell{width:100%;max-width:none;background:var(--bg-primary);min-height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden}

  /* Планшет/узкий десктоп (700–1099px): показать телефонную рамку по центру */
  @media (min-width:700px) and (max-width:1099px){
    body{background:#0a0a0a;padding:32px 16px;justify-content:center}
    #shell{max-width:420px;border-radius:44px;min-height:820px;max-height:900px;box-shadow:0 0 0 1px #1e1e1e,0 40px 80px -20px rgba(0,0,0,.6)}
  }

  /* Десктоп ≥1100px: сайдбар слева, широкий контент, без рамки */
  #sidebar{display:none}
  @media (min-width:1100px){
    body{background:var(--bg-primary);padding:0;justify-content:flex-start}
    #shell{flex-direction:row;max-width:none;min-height:100vh;overflow:visible}
    #sidebar{display:flex;flex-direction:column;width:240px;flex-shrink:0;padding:28px 18px;border-right:1px solid var(--border);background:var(--bg-primary);position:sticky;top:0;height:100vh}
    .sbar{display:none}
    .tabs{display:none!important}
    .fab{right:40px;bottom:40px}
  }
  @media (display-mode:standalone){body{padding:0} #shell{border-radius:0;box-shadow:none;max-height:none}}

  /* Сайдбар */
  #sidebar .brand{display:flex;align-items:center;gap:10px;padding:4px 10px;margin-bottom:22px}
  #sidebar .brand .logo{width:32px;height:32px;border-radius:8px;background:var(--bg-dark);display:flex;align-items:center;justify-content:center}
  #sidebar .brand .logo svg{width:20px;height:20px}
  #sidebar .brand .name{font-size:15px;font-weight:500;letter-spacing:-.3px}
  #sidebar .s-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;font-size:13.5px;color:var(--text-secondary);width:100%;transition:background .1s;cursor:pointer;margin-bottom:2px}
  #sidebar .s-item:hover{background:var(--bg-subtle)}
  #sidebar .s-item.on{background:var(--bg-dark);color:var(--text-on-dark);font-weight:500}
  #sidebar .s-item.on:hover{background:var(--bg-dark)}
  #sidebar .s-sep{flex:1}
  #sidebar .s-div{height:1px;background:var(--border);margin:14px 8px}
  #sidebar .s-foot{font-size:11px;color:var(--text-tertiary);padding:10px 14px;line-height:1.5}

  #app{flex:1;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;padding:18px 22px 20px;-webkit-overflow-scrolling:touch}
  @media (min-width:1100px){
    #app{padding:40px 56px 60px;align-items:flex-start}
    #app > *{width:100%;max-width:760px}
    #app .trophy-grid,#app .two-cards,#app .kpi-grid{max-width:760px}
    #app .field-row{max-width:520px}
    #app .btn-primary,#app .btn-ghost,#app .btn-danger{max-width:280px}
  }
  #app::-webkit-scrollbar{width:0}

  .sbar{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:500;letter-spacing:-.2px;margin-bottom:14px;flex-shrink:0}
  .sbar .dots{letter-spacing:2px}
  .nav{display:grid;grid-template-columns:28px 1fr 90px;align-items:center;gap:8px;flex-shrink:0}
  .nav .back{width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:18px;border-radius:8px}
  .nav .back:active{background:var(--bg-subtle)}
  .nav .ctitle{text-align:center;font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--text-secondary);font-weight:500;line-height:1.2}
  .nav .act{text-align:right;font-size:13.5px;font-weight:500}

  .label{font-size:10.5px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;color:var(--text-secondary)}
  .divider{height:1px;background:var(--border);margin:20px 0}
  .row{display:flex;align-items:center;justify-content:space-between}
  .num{font-feature-settings:"tnum" 1,"lnum" 1;letter-spacing:-.8px}
  .stack{display:flex;flex-direction:column;gap:8px}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 18px;border-radius:var(--r-md);font-weight:500;font-size:14px;letter-spacing:-.1px;transition:opacity .15s}
  .btn:active{opacity:.75}
  .btn-primary{background:var(--bg-dark);color:var(--text-on-dark);width:100%}
  .btn-ghost{background:var(--bg-secondary);color:var(--text-primary);border:1px solid var(--border);width:100%}
  .btn-danger{background:transparent;color:var(--danger);border:1px solid rgba(201,79,79,.3);width:100%}
  .btn-link{padding:8px 0;color:var(--text-primary);font-weight:500;font-size:13.5px}

  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .field label{font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--text-secondary);font-weight:500}
  .field input,.field select,.field textarea{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--r-md);padding:13px 14px;font-size:14.5px;color:var(--text-primary);outline:none;-webkit-appearance:none;appearance:none;width:100%}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--text-primary)}
  .field textarea{min-height:90px;resize:vertical;font-family:inherit}
  .field select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' fill='none' stroke='%238a8880' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:38px}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  /* ===== Профиль ===== */
  h1.name{font-size:30px;font-weight:500;letter-spacing:-.8px;margin:6px 0;line-height:1.1}
  .subtitle{font-size:13.5px;color:var(--text-secondary)}
  .stats-row{display:flex;gap:28px;margin:6px 0 4px;flex-wrap:wrap}
  .stat{display:flex;flex-direction:column;gap:6px}
  .stat .v{font-size:26px;font-weight:500;letter-spacing:-1px;font-feature-settings:"tnum" 1}
  .stat .v sup{font-size:13px;font-weight:500;margin-left:1px;letter-spacing:0;top:-.8em}
  .stat .k{font-size:10.5px;font-weight:500;letter-spacing:.7px;color:var(--text-secondary);text-transform:uppercase}

  .trophy-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
  .trophy{background:var(--bg-dark);border-radius:var(--r-md);padding:18px 8px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--text-on-dark);cursor:pointer}
  .trophy:active{opacity:.85}
  .trophy .medal{width:34px;height:34px}
  .trophy .medal svg{width:100%;height:100%}
  .trophy .t-name{font-size:10px;font-weight:500;letter-spacing:.6px;text-transform:uppercase}
  .trophy .t-count{font-size:18px;font-weight:500;font-feature-settings:"tnum" 1;letter-spacing:-.4px}
  .trophy.gold .t-name{color:var(--gold)} .trophy.silver .t-name{color:var(--silver)} .trophy.bronze .t-name{color:var(--bronze)}

  .streak{display:flex;gap:6px;margin-top:10px}
  .streak .cell{flex:1 1 0;aspect-ratio:1/1;min-width:0;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;cursor:pointer}
  .streak .win{background:var(--bg-dark);color:var(--text-on-dark)}
  .streak .loss{background:var(--bg-subtle);color:#5a5a52}
  .streak .empty{background:transparent;border:1px dashed var(--border);color:var(--text-tertiary);cursor:default}

  .empty-state{padding:22px 12px;text-align:center;color:var(--text-secondary)}
  .empty-state .e-title{font-size:15px;color:var(--text-primary);margin-bottom:6px;font-weight:500}
  .empty-state .e-sub{font-size:13px;line-height:1.5}

  .tabs{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--border);background:var(--bg-primary);padding:10px 0 calc(10px + env(safe-area-inset-bottom));flex-shrink:0}
  .tabs .tab{padding:6px 0;text-align:center;font-size:11.5px;color:var(--text-secondary);position:relative}
  .tabs .tab.on{color:var(--text-primary);font-weight:500}
  .tabs .tab.on::before{content:"";position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:999px;background:var(--text-primary)}

  .fab{position:absolute;right:20px;bottom:88px;width:56px;height:56px;border-radius:999px;background:var(--bg-dark);color:var(--text-on-dark);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:300;box-shadow:0 8px 24px -6px rgba(0,0,0,.4);z-index:5}
  .fab:active{transform:scale(.96)}

  /* Турниры */
  .event-group{margin-top:18px}
  .event-card{display:flex;gap:14px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--r-md);padding:14px;margin-bottom:10px;cursor:pointer}
  .event-card:active{background:var(--bg-subtle)}
  .event-card .date{flex:0 0 44px;text-align:center}
  .event-card .date .d{font-size:22px;font-weight:500;letter-spacing:-.8px;line-height:1;font-feature-settings:"tnum" 1}
  .event-card .date .m{font-size:10px;text-transform:uppercase;color:var(--text-secondary);margin-top:4px;letter-spacing:.4px;font-weight:500}
  .event-card .main{flex:1;min-width:0}
  .event-card .t{font-size:14.5px;font-weight:500;line-height:1.25}
  .event-card .s{font-size:12px;color:var(--text-secondary);margin-top:3px}
  .event-card .r{flex:0 0 auto;text-align:right}
  .event-card .r .place{font-size:20px;font-weight:500;font-feature-settings:"tnum" 1}
  .event-card .r .place.gold{color:var(--gold)} .event-card .r .place.silver{color:var(--silver)} .event-card .r .place.bronze{color:var(--bronze)}
  .event-card .r .score{font-size:11px;color:var(--text-secondary);margin-top:2px}

  h1.event-title{font-size:24px;font-weight:500;letter-spacing:-.6px;margin:8px 0;line-height:1.2}
  .event-sub{font-size:13.5px;color:var(--text-secondary)}
  .date-label{margin-top:24px}

  .hero{margin-top:18px;background:var(--bg-dark);color:var(--text-on-dark);border-radius:var(--r-lg);padding:20px 22px;position:relative;overflow:hidden;min-height:160px}
  .hero .badge{font-size:10.5px;letter-spacing:1px;font-weight:500;text-transform:uppercase;color:var(--gold)}
  .hero .place{display:flex;align-items:baseline;gap:10px;margin-top:18px}
  .hero .place .n{font-size:68px;line-height:.9;font-weight:500;letter-spacing:-4px;font-feature-settings:"tnum" 1}
  .hero .place .l{font-size:13px;letter-spacing:.8px;font-weight:500;text-transform:uppercase}
  .hero .medal-text{margin-top:10px;font-size:16px;font-weight:500}
  .hero .meta{margin-top:3px;font-size:12px;color:var(--text-on-dark-dim)}
  .hero .ring{position:absolute;right:-60px;top:-60px;width:200px;height:200px;border-radius:999px;border:1.5px solid rgba(212,175,55,.35)}
  .hero .ring::after{content:"";position:absolute;inset:30px;border-radius:999px;border:1.5px solid rgba(212,175,55,.18)}
  .hero.pending .n{font-size:22px;letter-spacing:-.5px}

  .two-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .mini-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px}
  .mini-card .k{font-size:10.5px;letter-spacing:.7px;color:var(--text-secondary);text-transform:uppercase;font-weight:500}
  .mini-card .v{margin-top:10px;font-size:24px;font-weight:500;letter-spacing:-.8px;font-feature-settings:"tnum" 1}
  .mini-card .v sup{font-size:12px;font-weight:500;margin-left:1px;color:var(--text-secondary)}
  .mini-card .sub{margin-top:4px;font-size:12px;color:var(--text-secondary)}

  .bracket-label{margin-top:22px;display:flex;justify-content:space-between;align-items:center}
  .bracket-label button{font-size:12.5px;font-weight:500}
  .bracket{display:flex;flex-direction:column;gap:9px;margin-top:12px}
  .fight{display:flex;align-items:center;gap:12px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--r-md);padding:11px;cursor:pointer}
  .fight:active{background:var(--bg-subtle)}
  .fight .no{flex:0 0 42px;height:42px;border-radius:10px;background:var(--bg-dark);color:var(--text-on-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9.5px;letter-spacing:.3px;text-transform:uppercase;line-height:1.1;font-weight:500}
  .fight .no b{font-size:13px;font-weight:500}
  .fight .info{flex:1;min-width:0}
  .fight .info .op{font-size:13.5px;font-weight:500}
  .fight .info .r{font-size:12px;color:var(--text-secondary);margin-top:2px}
  .fight .mark{flex:0 0 26px;height:26px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500}
  .fight .mark.w{background:var(--gold-soft);color:#1a1a1a}
  .fight .mark.l,.fight .mark.d{background:var(--bg-subtle);color:#5a5a52}
  .fight.final{background:var(--bg-dark);border-color:var(--bg-dark);color:var(--text-on-dark)}
  .fight.final .no{background:var(--gold-soft);color:#1a1a1a}
  .fight.final .info .op,.fight.final .info .r{color:var(--gold)}

  /* Разбор */
  .kicker{margin-top:24px;font-size:11px;letter-spacing:.9px;text-transform:uppercase;color:var(--text-secondary);font-weight:500}
  h1.opp{font-size:22px;font-weight:500;letter-spacing:-.4px;margin-top:10px;line-height:1.2}
  .opp-sub{margin-top:6px;font-size:13.5px;color:var(--text-secondary)}

  .tags{margin-top:12px;display:flex;flex-wrap:wrap;gap:8px}
  .tag{background:var(--bg-dark);color:var(--text-on-dark);border-radius:999px;padding:9px 14px;font-size:12.5px;font-weight:500;display:inline-flex;align-items:center;gap:6px}
  .tag .x{opacity:.5;cursor:pointer;font-size:14px;line-height:1}
  .tag.add{background:transparent;color:var(--text-secondary);border:1px dashed var(--border);cursor:pointer}

  .note{margin-top:12px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px;position:relative}
  .note .bar{position:absolute;left:14px;top:17px;width:3px;height:12px;border-radius:2px}
  .note .head{padding-left:14px;font-size:10.5px;letter-spacing:.9px;text-transform:uppercase;font-weight:500}
  .note.ok .bar{background:var(--success)}.note.ok .head{color:var(--success)}
  .note.bad .bar{background:var(--danger)}.note.bad .head{color:var(--danger)}
  .note textarea{width:100%;margin-top:10px;border:none;background:transparent;font-size:13.5px;line-height:1.5;color:var(--text-primary);outline:none;resize:vertical;min-height:60px;font-family:inherit;padding:0}

  .repeat{margin-top:12px;background:var(--bg-dark);color:var(--text-on-dark);border-radius:var(--r-md);padding:16px 18px}
  .repeat .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .repeat .head{font-size:11px;letter-spacing:.9px;text-transform:uppercase;font-weight:500;color:var(--gold)}
  .repeat .count{font-size:11px;color:var(--text-on-dark-dim);text-align:right;line-height:1.25}
  .repeat p{margin-top:12px;font-size:13.5px;line-height:1.5}

  /* Дневник */
  .review-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--r-md);padding:14px;margin-bottom:10px;cursor:pointer}
  .review-card .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
  .review-card .top .d,.review-card .top .r{font-size:11px;color:var(--text-secondary)}
  .review-card .t{font-size:14.5px;font-weight:500}
  .review-card .s{font-size:12.5px;color:var(--text-secondary);margin-top:4px;line-height:1.4}
  .review-card .tags{margin-top:8px} .review-card .tags .tag{padding:6px 10px;font-size:11.5px}

  /* Статы */
  .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .kpi{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--r-md);padding:14px}
  .kpi .k{font-size:10.5px;letter-spacing:.7px;color:var(--text-secondary);text-transform:uppercase;font-weight:500}
  .kpi .v{margin-top:10px;font-size:24px;font-weight:500;letter-spacing:-.8px;font-feature-settings:"tnum" 1}
  .kpi .v sup{font-size:12px;margin-left:1px;color:var(--text-secondary)}

  .bars{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--r-md);padding:16px;margin-top:12px}
  .bars h3{font-size:11px;letter-spacing:.7px;text-transform:uppercase;color:var(--text-secondary);font-weight:500;margin-bottom:14px}
  .bars .bar-row{display:grid;grid-template-columns:100px 1fr 30px;gap:10px;align-items:center;margin-bottom:10px}
  .bars .bar-row:last-child{margin-bottom:0}
  .bars .bar-row .nm{font-size:12.5px}
  .bars .bar-row .tr{background:var(--bg-subtle);height:6px;border-radius:3px;overflow:hidden}
  .bars .bar-row .tr>div{height:100%;background:var(--bg-dark);border-radius:3px}
  .bars .bar-row .nu{text-align:right;font-size:12px;color:var(--text-secondary);font-feature-settings:"tnum" 1}

  .insight{margin-top:14px;background:var(--bg-dark);color:var(--text-on-dark);border-radius:var(--r-md);padding:16px 18px}
  .insight .h{font-size:10.5px;letter-spacing:.9px;text-transform:uppercase;font-weight:500;color:var(--gold);margin-bottom:8px}
  .insight p{font-size:13.5px;line-height:1.5}

  /* Онбординг */
  .ob{flex:1;display:flex;flex-direction:column}
  .ob h1{font-size:30px;font-weight:500;letter-spacing:-.8px;line-height:1.1;margin-top:20px}
  .ob .sub{font-size:14px;color:var(--text-secondary);margin-top:10px;line-height:1.5}

  /* Модалка */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:50}
  .modal{background:var(--bg-primary);width:100%;max-width:420px;border-top-left-radius:var(--r-xl);border-top-right-radius:var(--r-xl);padding:20px 22px calc(22px + env(safe-area-inset-bottom))}
  .modal h3{font-size:17px;font-weight:500;margin-bottom:8px}
  .modal p{font-size:13.5px;color:var(--text-secondary);line-height:1.5;margin-bottom:18px}
  .modal .actions{display:flex;flex-direction:column;gap:8px}

  .toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#f7f4ec;padding:10px 18px;border-radius:999px;font-size:13.5px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:in .2s ease}
  @keyframes in{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
</style>
</head>
<body>
<div id="shell"><aside id="sidebar"></aside><div id="app"></div></div>

<script>
/* === Справочники === */
const SPORTS=[{v:'boxing',n:'Бокс'},{v:'mma',n:'ММА'},{v:'wrestling',n:'Борьба'},{v:'muay_thai',n:'Муай-тай'},{v:'sambo',n:'Самбо'}];
const WEIGHT_CATS=[48,51,54,57,60,63.5,67,71,75,80,86,92];
const WEIGHT_NAMES={48:'Наилегчайший',51:'Легчайший',54:'Полулёгкий',57:'Лёгкий',60:'Лёгкий',63.5:'Полусредний',67:'Полусредний',71:'Средний',75:'Полусредний',80:'Средний',86:'Полутяжёлый',92:'Тяжёлый'};
const RANKS=['Без разряда','3 юн.','2 юн.','1 юн.','3-й','2-й','1-й','КМС','МС','МСМК','ЗМС'];
const LEVELS=[{v:'city',n:'Городской'},{v:'regional',n:'Областной'},{v:'national',n:'Республиканский'},{v:'international',n:'Международный'}];
const RESULTS=[{v:'win',n:'Победа'},{v:'loss',n:'Поражение'},{v:'draw',n:'Ничья'}];
const METHODS=[{v:'ko',n:'Нокаут (KO)'},{v:'tko',n:'Тех. нокаут (TKO)'},{v:'decision_unanimous',n:'Решение: единогл.'},{v:'decision_split',n:'Решение: раздельное'},{v:'decision_majority',n:'Решение: большинства'},{v:'disqualification',n:'Дисквал. соперника'},{v:'withdrawal',n:'Снятие соперника'}];
const ROUNDS=['1/32','1/16','1/8','1/4','1/2','Финал'];
const PRESET_TAGS=['Защита корпуса','Выносливость 3р','Джеб','Работа ног','Клинч','Защита головы','Контратака','Дистанция'];
const MONTHS=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
const MONTHS_F=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];

/* === Хранилище === */
const STORAGE_KEY='trophy.v1';
let state={profile:null,events:[],fights:[],route:{name:'profile',params:{}}};

function load(){try{const r=localStorage.getItem(STORAGE_KEY);if(r){const d=JSON.parse(r);state.profile=d.profile||null;state.events=d.events||[];state.fights=d.fights||[]}}catch(e){}}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify({profile:state.profile,events:state.events,fights:state.fights}))}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}

/* === Утилиты === */
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function fmtDate(iso){if(!iso)return'';const d=new Date(iso);return d.getDate()+' '+MONTHS_F[d.getMonth()]+' '+d.getFullYear()}
function fmtDateShort(iso){if(!iso)return'';const d=new Date(iso);return d.getDate()+' '+MONTHS_F[d.getMonth()]}
function fmtDay(iso){if(!iso)return'';return new Date(iso).getDate()}
function fmtMon(iso){if(!iso)return'';return MONTHS[new Date(iso).getMonth()]}
function fmtN(n,d=1){if(n==null||isNaN(n))return'—';return Number(n).toFixed(d).replace('.',',').replace(/,0$/,'')}
function nameOf(list,v){const x=list.find(i=>i.v===v);return x?x.n:''}
const sportName=v=>nameOf(SPORTS,v), levelName=v=>nameOf(LEVELS,v)||'—', resultName=v=>nameOf(RESULTS,v)||'—', methodName=v=>nameOf(METHODS,v)||'';
function plural(n,a,b,c){n=Math.abs(n)%100;const n1=n%10;if(n>10&&n<20)return c;if(n1>1&&n1<5)return b;if(n1===1)return a;return c}
function eventFights(id){return state.fights.filter(f=>f.eventId===id).sort((a,b)=>(a.orderIndex||0)-(b.orderIndex||0))}
function allFightsSorted(){const m={};state.events.forEach(e=>m[e.id]=e.date);return state.fights.slice().sort((a,b)=>{const da=m[a.eventId]||'',db=m[b.eventId]||'';return db.localeCompare(da)||(b.orderIndex||0)-(a.orderIndex||0)})}

/* === Агрегации === */
function record(){let w=0,l=0,d=0;state.fights.forEach(f=>{if(f.result==='win')w++;else if(f.result==='loss')l++;else if(f.result==='draw')d++});return{w,l,d,total:w+l+d}}
function medals(){let g=0,s=0,b=0;state.events.forEach(e=>{if(e.place===1)g++;else if(e.place===2)s++;else if(e.place===3)b++});return{g,s,b,total:g+s+b}}
function winPct(){const r=record();return r.total?Math.round(r.w/r.total*100):0}
function doneEvents(){return state.events.filter(e=>e.status!=='upcoming').length}
function lastFights(n=10){return allFightsSorted().slice(0,n).reverse()}
function repeatingTags(excl,N=3){const s=allFightsSorted().filter(f=>f.id!==excl).slice(0,N);if(s.length<N)return[];const c={};s.forEach(f=>(f.tags||[]).forEach(t=>c[t]=(c[t]||0)+1));return Object.entries(c).filter(([,k])=>k>=N).map(([t])=>t)}

/* === Router === */
function _go(n,p){state.route={name:n,params:p||{}};save();render();const a=document.getElementById('app');if(a)a.scrollTop=0}
window.go=function(n,p){history.pushState({route:{name:n,params:p||{}}},'','#'+n);_go(n,p)};

/* === Иконки === */
const medalIcon=c=>`<svg viewBox="0 0 40 40" fill="none" stroke="${c}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M13 3 L10 14 M27 3 L30 14"/><circle cx="20" cy="24" r="11"/><circle cx="20" cy="24" r="5.5"/></svg>`;

/* === Шаблоны === */
function sbar(){const t=new Date();return `<div class="sbar"><span>${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}</span><span class="dots">· · ·</span></div>`}

function viewOnboarding(){
  const p=state.profile||{};
  return `${sbar()}
  <div class="ob">
    <div class="label">Новый спортсмен</div>
    <h1>Твой цифровой<br/>трофейный зал</h1>
    <div class="sub">Записывай бои, смотри прогресс, веди дневник ошибок. Всё оффлайн и сохраняется в этом браузере.</div>
    <form id="ob-form" style="margin-top:28px;flex:1;display:flex;flex-direction:column">
      <div class="field-row">
        <div class="field"><label>Имя</label><input name="firstName" required value="${esc(p.firstName||'')}"/></div>
        <div class="field"><label>Фамилия</label><input name="lastName" required value="${esc(p.lastName||'')}"/></div>
      </div>
      <div class="field"><label>Вид спорта</label>
        <select name="sport">${SPORTS.map(s=>`<option value="${s.v}" ${p.sport===s.v?'selected':''}>${s.n}</option>`).join('')}</select>
      </div>
      <div class="field-row">
        <div class="field"><label>Весовая</label>
          <select name="weightCategoryKg">${WEIGHT_CATS.map(w=>`<option value="${w}" ${p.weightCategoryKg==w?'selected':''}>до ${fmtN(w)} кг</option>`).join('')}</select>
        </div>
        <div class="field"><label>Разряд</label>
          <select name="rank">${RANKS.map(r=>`<option ${p.rank===r?'selected':''}>${r}</option>`).join('')}</select>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>Город</label><input name="city" value="${esc(p.city||'')}" placeholder="Алматы"/></div>
        <div class="field"><label>Клуб</label><input name="club" value="${esc(p.club||'')}"/></div>
      </div>
      <div class="field"><label>Тренер</label><input name="coach" value="${esc(p.coach||'')}" placeholder="ФИО"/></div>
      <div style="margin-top:auto;padding-top:12px"><button type="submit" class="btn btn-primary">Начать</button></div>
    </form>
  </div>`;
}

function viewProfile(){
  const p=state.profile,r=record(),m=medals(),pct=winPct(),last=lastFights(10);
  return `${sbar()}
    <div class="row">
      <span class="label">Атлет</span>
      <button class="btn-link" data-go="settings">Настройки</button>
    </div>
    <h1 class="name">${esc(p.firstName)} ${esc(p.lastName)}</h1>
    <div class="subtitle">${esc(sportName(p.sport))} · до ${fmtN(p.weightCategoryKg)} кг · ${esc(p.city||'—')}</div>
    <div class="divider"></div>
    <div class="stats-row">
      <div class="stat"><div class="v num">${doneEvents()}</div><div class="k">Турниры</div></div>
      <div class="stat"><div class="v num">${r.w}–${r.l}${r.d?('–'+r.d):''}</div><div class="k">Рекорд</div></div>
      <div class="stat"><div class="v num">${pct}<sup>%</sup></div><div class="k">Побед</div></div>
    </div>
    <div class="divider"></div>
    <div class="row">
      <span class="label">Трофейный зал</span>
      <span class="label" style="letter-spacing:.2px;text-transform:none">${m.total?m.total+' медал'+plural(m.total,'ь','и','ей'):'пока пусто'}</span>
    </div>
    <div class="trophy-grid">
      <div class="trophy gold"   data-filter="1"><div class="medal">${medalIcon('#d4af37')}</div><div class="t-name">Золото</div><div class="t-count">${m.g}</div></div>
      <div class="trophy silver" data-filter="2"><div class="medal">${medalIcon('#b8b6b0')}</div><div class="t-name">Серебро</div><div class="t-count">${m.s}</div></div>
      <div class="trophy bronze" data-filter="3"><div class="medal">${medalIcon('#cd7f32')}</div><div class="t-name">Бронза</div><div class="t-count">${m.b}</div></div>
    </div>
    <div class="label" style="margin-top:22px">Последние 10 боёв</div>
    <div class="streak">
      ${Array.from({length:10},(_,i)=>{const f=last[i];if(!f)return'<div class="cell empty">·</div>';const cls=f.result==='win'?'win':'loss';const txt=f.result==='win'?'П':(f.result==='loss'?'Пр':'Н');return `<div class="cell ${cls}" data-go-fight="${f.id}">${txt}</div>`}).join('')}
    </div>
    ${state.events.length===0?`<div class="empty-state" style="margin-top:24px"><div class="e-title">Пока пусто</div><div class="e-sub">Добавь первый турнир — статистика соберётся сама.</div><button class="btn btn-primary" style="margin-top:16px;max-width:240px" data-go="event-new">Добавить турнир</button></div>`:''}
  `;
}

function viewEvents(){
  const all=state.events.slice().sort((a,b)=>b.date.localeCompare(a.date));
  const up=all.filter(e=>e.status==='upcoming'),dn=all.filter(e=>e.status!=='upcoming');
  return `${sbar()}
    <div><div class="label">Все турниры</div><h1 class="name" style="font-size:24px">${all.length} ${plural(all.length,'турнир','турнира','турниров')}</h1></div>
    ${up.length?`<div class="event-group"><div class="label">Предстоящие</div>${up.map(eventCard).join('')}</div>`:''}
    ${dn.length?`<div class="event-group"><div class="label">Завершённые</div>${dn.map(eventCard).join('')}</div>`:''}
    ${all.length===0?`<div class="empty-state" style="margin-top:32px"><div class="e-title">Ни одного турнира</div><div class="e-sub">Жми «+» внизу справа.</div></div>`:''}
  `;
}
function eventCard(e){
  const f=eventFights(e.id),w=f.filter(x=>x.result==='win').length,l=f.filter(x=>x.result==='loss').length;
  const pc=e.place===1?'gold':e.place===2?'silver':e.place===3?'bronze':'';
  return `<div class="event-card" data-go-event="${e.id}">
    <div class="date"><div class="d num">${fmtDay(e.date)}</div><div class="m">${fmtMon(e.date)}</div></div>
    <div class="main"><div class="t">${esc(e.title)}</div><div class="s">${esc(e.city||'')}${e.city&&e.level?' · ':''}${levelName(e.level)}</div></div>
    <div class="r"><div class="place ${pc}">${e.place||'—'}</div>${f.length?`<div class="score">${w}–${l}</div>`:''}</div>
  </div>`;
}

function viewEventDetail(id){
  const e=state.events.find(x=>x.id===id);if(!e)return viewEvents();
  const f=eventFights(e.id),w=f.filter(x=>x.result==='win').length,l=f.filter(x=>x.result==='loss').length;
  const up=e.status==='upcoming';
  const pt=e.place===1?'Золотая медаль':e.place===2?'Серебряная медаль':e.place===3?'Бронзовая медаль':e.place?e.place+'-е место':'Результат не указан';
  const walk=e.walkAround?(e.walkAround-(e.weighIn||0)):null;
  return `${sbar()}
    <div class="nav"><button class="back" data-back>←</button><div class="ctitle">Турнир</div><button class="act" data-go="event-edit" data-id="${e.id}">Править</button></div>
    <div class="label date-label">${fmtDate(e.date)}</div>
    <h1 class="event-title">${esc(e.title)}</h1>
    <div class="event-sub">${esc(e.venue||e.city||'')}${(e.venue||e.city)&&e.level?' · ':''}${levelName(e.level)}</div>
    <div class="hero ${up?'pending':''}">
      <div class="ring"></div>
      <div class="badge">${up?'Предстоит':'Результат'}</div>
      ${up?`<div class="place"><div class="n num">${fmtDate(e.date)}</div></div><div class="medal-text">Запланирован</div><div class="meta">${f.length?f.length+' боёв':'Впиши цель перед турниром'}</div>`:`<div class="place"><div class="n num">${e.place||'—'}</div><div class="l">Место</div></div><div class="medal-text">${pt}</div><div class="meta">${f.length} бо${plural(f.length,'й','я','ёв')}${f.length?' · '+w+' побед'+(l?', '+l+' пораж.':''):''}</div>`}
    </div>
    <div class="two-cards">
      <div class="mini-card"><div class="k">Взвешивание</div><div class="v num">${e.weighIn?fmtN(e.weighIn):'—'}${e.weighIn?'<sup>кг</sup>':''}</div><div class="sub">${walk!=null?'Согнал '+fmtN(walk)+' кг':(e.weighIn?'—':'Не указано')}</div></div>
      <div class="mini-card"><div class="k">Категория</div><div class="v num">${fmtN(e.weightKg)}<sup>кг</sup></div><div class="sub">${WEIGHT_NAMES[e.weightKg]||''}</div></div>
    </div>
    <div class="bracket-label"><span class="label">Сетка боёв</span><button data-go="fight-new" data-id="${e.id}">+ бой</button></div>
    <div class="bracket">${f.length?f.map(fightRow).join(''):`<div class="empty-state"><div class="e-sub">Боёв пока нет. Добавь первый.</div></div>`}</div>
    ${e.notes?`<div style="margin-top:22px"><div class="label">Заметки</div><div style="margin-top:8px;font-size:13.5px;line-height:1.5">${esc(e.notes)}</div></div>`:''}
    <div style="margin-top:28px"><button class="btn btn-danger" data-del-event="${e.id}">Удалить турнир</button></div>
  `;
}
function fightRow(f){
  const fn=f.round==='Финал';const cls=fn?'fight final':'fight';const mc=f.result==='win'?'w':f.result==='loss'?'l':'d';const mt=f.result==='win'?'П':f.result==='loss'?'Пр':'Н';
  const rL=f.round?(f.round==='Финал'?'Ф':f.round):'—';
  let line='';if(f.result)line=resultName(f.result);
  if(f.method)line+=(line?' · ':'')+methodName(f.method).toLowerCase().replace('нокаут (ko)','КО').replace('тех. нокаут (tko)','ТКО').replace('решение: ','решение ');
  if(f.result==='win'&&f.scoreSelf&&f.scoreOpponent)line='Победа · '+f.scoreSelf+'–'+f.scoreOpponent;
  return `<div class="${cls}" data-go-fight="${f.id}"><div class="no"><span>Бой</span><b>${rL}</b></div><div class="info"><div class="op">vs ${esc(f.opponentName||'—')}</div><div class="r">${line||'Без результата'}</div></div><div class="mark ${mc}">${mt}</div></div>`;
}

function viewEventForm(mode,id){
  const e=id?state.events.find(x=>x.id===id):null;
  const d=e||{title:'',date:new Date().toISOString().slice(0,10),city:'',venue:'',level:'city',weightKg:state.profile.weightCategoryKg,weighIn:'',walkAround:'',place:'',totalParticipants:'',status:'completed',notes:''};
  return `${sbar()}
  <div class="nav"><button class="back" data-back>←</button><div class="ctitle">${mode==='new'?'Новый турнир':'Редактирование'}</div><button class="act" data-submit="event-form">Сохранить</button></div>
  <form id="event-form" style="margin-top:22px">
    <div class="field"><label>Название</label><input name="title" required value="${esc(d.title)}" placeholder="Открытый чемпионат"/></div>
    <div class="field-row">
      <div class="field"><label>Дата</label><input name="date" type="date" required value="${d.date}"/></div>
      <div class="field"><label>Статус</label><select name="status"><option value="completed" ${d.status==='completed'?'selected':''}>Завершён</option><option value="upcoming" ${d.status==='upcoming'?'selected':''}>Предстоит</option></select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Город</label><input name="city" value="${esc(d.city||'')}"/></div>
      <div class="field"><label>Арена</label><input name="venue" value="${esc(d.venue||'')}"/></div>
    </div>
    <div class="field"><label>Уровень</label><select name="level">${LEVELS.map(l=>`<option value="${l.v}" ${d.level===l.v?'selected':''}>${l.n}</option>`).join('')}</select></div>
    <div class="field-row">
      <div class="field"><label>Весовая, кг</label><select name="weightKg">${WEIGHT_CATS.map(w=>`<option value="${w}" ${d.weightKg==w?'selected':''}>${fmtN(w)}</option>`).join('')}</select></div>
      <div class="field"><label>Взвешивание, кг</label><input name="weighIn" inputmode="decimal" value="${d.weighIn||''}" placeholder="74,8"/></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Ходовой вес, кг</label><input name="walkAround" inputmode="decimal" value="${d.walkAround||''}" placeholder="78,2"/></div>
      <div class="field"><label>Участников</label><input name="totalParticipants" inputmode="numeric" value="${d.totalParticipants||''}"/></div>
    </div>
    <div class="field"><label>Итоговое место</label><select name="place"><option value="">—</option>${[1,2,3,4,5,6,7,8].map(p=>`<option value="${p}" ${d.place==p?'selected':''}>${p}</option>`).join('')}</select></div>
    <div class="field"><label>Заметки</label><textarea name="notes" placeholder="Общие впечатления">${esc(d.notes||'')}</textarea></div>
    <button type="submit" class="btn btn-primary">${mode==='new'?'Создать':'Сохранить'}</button>
  </form>`;
}

function viewFightForm(mode,params){
  const f=mode==='edit'?state.fights.find(x=>x.id===params.id):null;
  const eventId=f?f.eventId:params.eventId;
  const e=state.events.find(x=>x.id===eventId);if(!e)return viewEvents();
  const ords=eventFights(eventId).map(x=>x.orderIndex||0);
  const nextO=Math.max(0,...ords)+1,nextR=ROUNDS[Math.min(ords.length,ROUNDS.length-1)]||'Финал';
  const d=f||{round:nextR,orderIndex:nextO,opponentName:'',opponentClub:'',opponentCity:'',result:'win',method:'decision_unanimous',roundsTotal:3,roundEnded:'',scoreSelf:'',scoreOpponent:'',worked:'',didntWork:'',tags:[]};
  const rep=f?repeatingTags(f.id,3):[];
  return `${sbar()}
    <div class="nav"><button class="back" data-back>←</button><div class="ctitle">Разбор<br/>боя</div><button class="act" data-submit="fight-form">Сохранить</button></div>
    <div class="kicker">${esc(d.round||'Бой')} · ${fmtDateShort(e.date)}</div>
    <h1 class="opp">${f?'vs '+esc(d.opponentName||'—'):'Новый бой'}</h1>
    <div class="opp-sub">${esc(e.title)}</div>
    <form id="fight-form" style="margin-top:16px">
      <div class="field-row">
        <div class="field"><label>Раунд турнира</label><select name="round">${ROUNDS.map(r=>`<option ${d.round===r?'selected':''}>${r}</option>`).join('')}</select></div>
        <div class="field"><label>Порядок</label><input name="orderIndex" type="number" min="1" value="${d.orderIndex}"/></div>
      </div>
      <div class="field"><label>Соперник</label><input name="opponentName" required value="${esc(d.opponentName||'')}" placeholder="Имя и фамилия"/></div>
      <div class="field-row">
        <div class="field"><label>Клуб</label><input name="opponentClub" value="${esc(d.opponentClub||'')}"/></div>
        <div class="field"><label>Город</label><input name="opponentCity" value="${esc(d.opponentCity||'')}"/></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Результат</label><select name="result">${RESULTS.map(r=>`<option value="${r.v}" ${d.result===r.v?'selected':''}>${r.n}</option>`).join('')}</select></div>
        <div class="field"><label>Способ</label><select name="method">${METHODS.map(m=>`<option value="${m.v}" ${d.method===m.v?'selected':''}>${m.n}</option>`).join('')}</select></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Всего раундов</label><input name="roundsTotal" type="number" min="1" max="15" value="${d.roundsTotal||3}"/></div>
        <div class="field"><label>Окончен в раунде</label><input name="roundEnded" type="number" min="0" max="15" value="${d.roundEnded||''}"/></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Твои очки</label><input name="scoreSelf" value="${d.scoreSelf||''}" placeholder="29"/></div>
        <div class="field"><label>Очки соперника</label><input name="scoreOpponent" value="${d.scoreOpponent||''}" placeholder="28"/></div>
      </div>
      <div class="label" style="margin-top:18px">Что отработать</div>
      <div class="tags" id="tags-area">
        ${(d.tags||[]).map(t=>`<span class="tag" data-tag="${esc(t)}">${esc(t)}<span class="x">×</span></span>`).join('')}
        <button type="button" class="tag add" id="add-tag">+ добавить</button>
      </div>
      <input type="hidden" name="tags" id="tags-input" value="${esc((d.tags||[]).join(','))}"/>
      <div class="note ok" style="margin-top:14px"><span class="bar"></span><div class="head">Сработало</div><textarea name="worked" placeholder="Что получалось">${esc(d.worked||'')}</textarea></div>
      <div class="note bad"><span class="bar"></span><div class="head">Не сработало</div><textarea name="didntWork" placeholder="Ошибки, пропущенные удары">${esc(d.didntWork||'')}</textarea></div>
      ${rep.length?`<div class="repeat"><div class="top"><div class="head">Повторяется</div><div class="count">3+ боя<br/>подряд</div></div><p>«${esc(rep[0])}» — встречается в последних боях. Стоит поднять приоритет на тренировках.</p></div>`:''}
      <div style="margin-top:22px"><button type="submit" class="btn btn-primary">${mode==='new'?'Добавить бой':'Сохранить'}</button></div>
      ${f?`<div style="margin-top:10px"><button type="button" class="btn btn-danger" data-del-fight="${f.id}">Удалить бой</button></div>`:''}
    </form>`;
}

function viewJournal(){
  const rs=allFightsSorted().filter(f=>f.worked||f.didntWork||(f.tags||[]).length);
  const last=allFightsSorted().slice(0,10),cnt={};last.forEach(f=>(f.tags||[]).forEach(t=>cnt[t]=(cnt[t]||0)+1));
  const top=Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,5);
  return `${sbar()}
    <h1 class="name" style="font-size:24px">Дневник</h1>
    <div class="subtitle">${rs.length} ${plural(rs.length,'запись','записи','записей')}</div>
    ${top.length?`<div class="label" style="margin-top:22px">Повторяющиеся</div><div class="bars" style="margin-top:10px">${top.map(([t,c])=>{const p=Math.round(c/last.length*100);return `<div class="bar-row"><div class="nm">${esc(t)}</div><div class="tr"><div style="width:${p}%"></div></div><div class="nu">${c} бо${plural(c,'й','я','ёв')}</div></div>`}).join('')}</div>`:''}
    <div class="label" style="margin-top:22px">Последние разборы</div>
    <div style="margin-top:10px">${rs.length?rs.map(f=>{const e=state.events.find(x=>x.id===f.eventId);const txt=(f.worked||f.didntWork||'').slice(0,120);return `<div class="review-card" data-go-fight="${f.id}"><div class="top"><div class="d">${e?fmtDateShort(e.date):''}</div><div class="r">${resultName(f.result)}</div></div><div class="t">vs ${esc(f.opponentName||'—')}</div><div class="s">${esc(txt)}${(f.worked||f.didntWork||'').length>120?'…':''}</div>${(f.tags||[]).length?`<div class="tags">${f.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:''}</div>`}).join(''):`<div class="empty-state"><div class="e-sub">Пока нет разборов. Открой бой и заполни «сработало / не сработало».</div></div>`}</div>`;
}

function viewStats(){
  const r=record(),done=doneEvents(),tot=r.total;
  const wi=state.events.filter(e=>e.weighIn).map(e=>Number(e.weighIn));
  const avg=wi.length?wi.reduce((a,b)=>a+b,0)/wi.length:null;
  const ma={};state.fights.filter(f=>f.result==='win'&&f.method).forEach(f=>ma[f.method]=(ma[f.method]||0)+1);
  const mr=Object.entries(ma).sort((a,b)=>b[1]-a[1]),mx=Math.max(1,...mr.map(x=>x[1]));
  const la={};state.events.forEach(e=>{if(e.status==='upcoming')return;const f=eventFights(e.id),w=f.filter(x=>x.result==='win').length;if(!la[e.level])la[e.level]={w:0,t:0};la[e.level].w+=w;la[e.level].t+=f.length});
  const ins=insight();
  return `${sbar()}
    <h1 class="name" style="font-size:24px">Статистика</h1>
    <div class="subtitle">Карьера целиком</div>
    <div class="kpi-grid">
      <div class="kpi"><div class="k">% побед</div><div class="v num">${winPct()}<sup>%</sup></div></div>
      <div class="kpi"><div class="k">Турниры</div><div class="v num">${done}</div></div>
      <div class="kpi"><div class="k">Всего боёв</div><div class="v num">${tot}</div></div>
      <div class="kpi"><div class="k">Ср. вес</div><div class="v num">${avg?fmtN(avg):'—'}${avg?'<sup>кг</sup>':''}</div></div>
    </div>
    ${ins?`<div class="insight"><div class="h">Наблюдение</div><p>${ins}</p></div>`:''}
    ${mr.length?`<div class="bars"><h3>Способы побед</h3>${mr.map(([m,c])=>`<div class="bar-row"><div class="nm">${esc(methodName(m))}</div><div class="tr"><div style="width:${c/mx*100}%"></div></div><div class="nu">${c}</div></div>`).join('')}</div>`:''}
    ${Object.keys(la).length?`<div class="bars"><h3>По уровням</h3>${Object.entries(la).map(([lv,d])=>{const p=d.t?Math.round(d.w/d.t*100):0;return `<div class="bar-row"><div class="nm">${esc(levelName(lv))}</div><div class="tr"><div style="width:${p}%"></div></div><div class="nu">${p}%</div></div>`}).join('')}</div>`:''}
    ${tot===0?`<div class="empty-state"><div class="e-sub">Добавь бои — здесь появятся графики.</div></div>`:''}`;
}
function insight(){
  const r=record();if(r.total<3)return'';
  const rec=allFightsSorted().slice(0,10);let ws=0,ls=0;for(const f of rec){if(f.result==='win')ws++;else break}for(const f of rec){if(f.result==='loss')ls++;else break}
  if(ws>=5)return `Серия из ${ws} побед подряд. Держи темп тренировок.`;
  if(ls>=2)return `${ls} поражения подряд. Посмотри повторяющиеся ошибки в дневнике.`;
  const wins=state.fights.filter(f=>f.result==='win'),early=wins.filter(f=>f.method==='ko'||f.method==='tko').length;
  if(wins.length>=5&&early/wins.length>0.6)return `${Math.round(early/wins.length*100)}% побед досрочно — ты нокаутёр. Это определяет тренировочный фокус.`;
  const dn=state.events.filter(e=>e.status!=='upcoming').sort((a,b)=>b.date.localeCompare(a.date));
  if(dn.length){const lst=new Date(dn[0].date),days=Math.floor((Date.now()-lst.getTime())/86400000);if(days>90)return `${Math.floor(days/30)} мес. без выступлений. Лучшая форма обычно в первые 6 недель после турнира.`}
  const last4=state.events.filter(e=>e.weighIn&&e.weightKg).slice(-4);
  if(last4.length>=3){const hit=last4.filter(e=>Number(e.weighIn)/Number(e.weightKg)>0.99).length;if(hit>=3)return 'Идёшь на пределе категории. Возможно, пора в весовую выше.'}
  return 'Всё идёт по плану. Продолжай фиксировать бои — чем больше данных, тем точнее выводы.';
}

function viewSettings(){
  const p=state.profile;
  return `${sbar()}
    <div class="nav"><button class="back" data-back>←</button><div class="ctitle">Настройки</div><span></span></div>
    <h1 class="name" style="font-size:22px;margin-top:14px">Профиль</h1>
    <form id="profile-form" style="margin-top:12px">
      <div class="field-row">
        <div class="field"><label>Имя</label><input name="firstName" value="${esc(p.firstName||'')}" required/></div>
        <div class="field"><label>Фамилия</label><input name="lastName" value="${esc(p.lastName||'')}" required/></div>
      </div>
      <div class="field"><label>Вид спорта</label><select name="sport">${SPORTS.map(s=>`<option value="${s.v}" ${p.sport===s.v?'selected':''}>${s.n}</option>`).join('')}</select></div>
      <div class="field-row">
        <div class="field"><label>Весовая</label><select name="weightCategoryKg">${WEIGHT_CATS.map(w=>`<option value="${w}" ${p.weightCategoryKg==w?'selected':''}>до ${fmtN(w)} кг</option>`).join('')}</select></div>
        <div class="field"><label>Разряд</label><select name="rank">${RANKS.map(r=>`<option ${p.rank===r?'selected':''}>${r}</option>`).join('')}</select></div>
      </div>
      <div class="field-row">

        <div class="field"><label>Клуб</label><input name="club" value="${esc(p.club||'')}"/></div>
      </div>
      <div class="field"><label>Тренер</label><input name="coach" value="${esc(p.coach||'')}"/></div>
      <button type="submit" class="btn btn-primary">Сохранить</button>
    </form>
    <div class="divider"></div>
    <div class="label">Данные</div>
    <div class="stack" style="margin-top:10px">
      <button class="btn btn-ghost" id="export-json">Экспорт в JSON</button>
      <button class="btn btn-ghost" id="import-json">Импорт из JSON</button>
      <button class="btn btn-danger" id="reset-all">Удалить все данные</button>

    <div style="margin-top:24px;color:var(--text-tertiary);font-size:11.5px;text-align:center">Trophy · v1 · работает оффлайн</div>`;

function viewTabs(){
  const c=state.route.name;
  return `<div class="tabs">
    <button class="tab ${c==='profile'?'on':''}" data-tab="profile">Профиль</button>
    <button class="tab ${c==='events'?'on':''}" data-tab="events">Турниры</button>
    <button class="tab ${c==='journal'?'on':''}" data-tab="journal">Дневник</button>
    <button class="tab ${c==='stats'?'on':''}" data-tab="stats">Статы</button>
  </div>`;
}

function renderSidebar(){
  const sb=document.getElementById('sidebar');
  if(!sb)return;
  const c=state.route.name;
  const mainTabs=['profile','events','journal','stats'];
  const onTab=mainTabs.includes(c)?c:'';
  sb.innerHTML=`
    <div class="brand">
      <div class="logo"><svg viewBox="0 0 40 40" fill="none" stroke="#d4af37" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 6 L10 16 M27 6 L30 16"/><circle cx="20" cy="24" r="10"/><circle cx="20" cy="24" r="5"/></svg></div>
      <div class="name">Trophy</div>
    </div>
    <button class="s-item ${onTab==='profile'?'on':''}" data-tab="profile">Профиль</button>
    <button class="s-item ${onTab==='events'?'on':''}" data-tab="events">Турниры</button>
    <button class="s-item ${onTab==='journal'?'on':''}" data-tab="journal">Дневник</button>
    <button class="s-item ${onTab==='stats'?'on':''}" data-tab="stats">Статы</button>
    <div class="s-div"></div>
    <button class="s-item ${c==='event-new'?'on':''}" data-go="event-new">+ Новый турнир</button>
    <div class="s-sep"></div>
    <button class="s-item ${c==='settings'?'on':''}" data-go="settings">Настройки</button>
    <div class="s-foot">Trophy · v1<br/>работает оффлайн</div>
  `;
  sb.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>go(b.dataset.tab));
  sb.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>go(b.dataset.go));
}

/* === Главный рендер === */
function render(){
  const app=document.getElementById('app'),sh=document.getElementById('shell');
  if(!state.profile){app.innerHTML=viewOnboarding();removeTabs();removeFab();bind();return}
  const r=state.route;let html='',tabs=true,fab=false;
  if(r.name==='profile'){html=viewProfile()}
  else if(r.name==='events'){html=viewEvents();fab=true}
  else if(r.name==='journal'){html=viewJournal()}
  else if(r.name==='stats'){html=viewStats()}
  else if(r.name==='event'){html=viewEventDetail(r.params.id);tabs=false}
  else if(r.name==='event-new'){html=viewEventForm('new');tabs=false}
  else if(r.name==='event-edit'){html=viewEventForm('edit',r.params.id);tabs=false}
  else if(r.name==='fight-new'){html=viewFightForm('new',{eventId:r.params.id});tabs=false}
  else if(r.name==='fight-edit'){html=viewFightForm('edit',{id:r.params.id});tabs=false}
  else if(r.name==='settings'){html=viewSettings();tabs=false}
  else html=viewProfile();
  app.innerHTML=html;
  tabs?addTabs():removeTabs();
  fab?addFab():removeFab();
  renderSidebar();
  bind();
}
function addTabs(){removeTabs();document.getElementById('shell').insertAdjacentHTML('beforeend',viewTabs());document.querySelectorAll('#shell .tabs .tab').forEach(b=>b.onclick=()=>go(b.dataset.tab))}
function removeTabs(){document.querySelectorAll('#shell .tabs').forEach(x=>x.remove())}
function addFab(){removeFab();document.getElementById('shell').insertAdjacentHTML('beforeend','<button class="fab" id="fab">+</button>');document.getElementById('fab').onclick=()=>go('event-new')}
function removeFab(){document.querySelectorAll('#shell .fab').forEach(x=>x.remove())}

/* === Биндеры === */
function bind(){
  const app=document.getElementById('app');
  app.querySelectorAll('[data-back]').forEach(b=>b.onclick=()=>history.length>1?history.back():go('profile'));
  app.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>{const n=b.dataset.go,id=b.dataset.id;id?go(n,{id}):go(n)});
  app.querySelectorAll('[data-go-event]').forEach(b=>b.onclick=()=>go('event',{id:b.dataset.goEvent}));
  app.querySelectorAll('[data-go-fight]').forEach(b=>b.onclick=()=>go('fight-edit',{id:b.dataset.goFight}));

  const ob=document.getElementById('ob-form');
  if(ob)ob.onsubmit=e=>{e.preventDefault();const fd=new FormData(ob);const w=Number(fd.get('weightCategoryKg'));state.profile=Object.assign({},state.profile||{},{firstName:fd.get('firstName'),lastName:fd.get('lastName'),sport:fd.get('sport'),weightCategoryKg:w,weightCategoryName:WEIGHT_NAMES[w]||'',rank:fd.get('rank'),city:fd.get('city')||'',club:fd.get('club')||'',coach:fd.get('coach')||''});save();go('profile')};

  const pf=document.getElementById('profile-form');
  if(pf)pf.onsubmit=e=>{e.preventDefault();const fd=new FormData(pf);const w=Number(fd.get('weightCategoryKg'));Object.assign(state.profile,{firstName:fd.get('firstName'),lastName:fd.get('lastName'),sport:fd.get('sport'),weightCategoryKg:w,weightCategoryName:WEIGHT_NAMES[w]||'',rank:fd.get('rank'),city:fd.get('city'),club:fd.get('club'),coach:fd.get('coach')});save();toast('Сохранено');go('profile')};

  const ef=document.getElementById('event-form');
  if(ef){
    const sb=document.querySelector('[data-submit="event-form"]');if(sb)sb.onclick=()=>ef.requestSubmit();
    ef.onsubmit=e=>{e.preventDefault();const fd=new FormData(ef);const cur=state.route.name==='event-edit'?state.events.find(x=>x.id===state.route.params.id):null;const p={id:cur?cur.id:uid(),title:fd.get('title'),date:fd.get('date'),city:fd.get('city'),venue:fd.get('venue'),level:fd.get('level'),weightKg:Number(fd.get('weightKg')),weighIn:fd.get('weighIn')?Number(String(fd.get('weighIn')).replace(',','.')):null,walkAround:fd.get('walkAround')?Number(String(fd.get('walkAround')).replace(',','.')):null,place:fd.get('place')?Number(fd.get('place')):null,totalParticipants:fd.get('totalParticipants')?Number(fd.get('totalParticipants')):null,status:fd.get('status'),notes:fd.get('notes')};if(cur)Object.assign(cur,p);else state.events.push(p);save();go('event',{id:p.id})};
  }

  const ff=document.getElementById('fight-form');
  if(ff){
    const sb=document.querySelector('[data-submit="fight-form"]');if(sb)sb.onclick=()=>ff.requestSubmit();
    const ta=document.getElementById('tags-area'),ti=document.getElementById('tags-input'),ab=document.getElementById('add-tag');
    const sync=()=>{ti.value=Array.from(ta.querySelectorAll('.tag:not(.add)')).map(x=>x.dataset.tag).join(',')};
    ta.querySelectorAll('.tag:not(.add) .x').forEach(x=>x.onclick=e=>{e.stopPropagation();x.closest('.tag').remove();sync()});
    ab.onclick=()=>{const ex=ti.value.split(',').filter(Boolean);const sug=PRESET_TAGS.find(t=>!ex.includes(t))||'';const v=prompt('Тег (например, «Защита корпуса»)',sug);if(!v)return;const t=v.trim();if(!t||ex.includes(t))return;const el=document.createElement('span');el.className='tag';el.dataset.tag=t;el.innerHTML=esc(t)+'<span class="x">×</span>';el.querySelector('.x').onclick=e=>{e.stopPropagation();el.remove();sync()};ta.insertBefore(el,ab);sync()};
    ff.onsubmit=e=>{e.preventDefault();const fd=new FormData(ff);const ed=state.route.name==='fight-edit',cur=ed?state.fights.find(x=>x.id===state.route.params.id):null;const eid=cur?cur.eventId:state.route.params.id;const tags=(fd.get('tags')||'').split(',').map(s=>s.trim()).filter(Boolean);const p={id:cur?cur.id:uid(),eventId:eid,round:fd.get('round'),orderIndex:Number(fd.get('orderIndex'))||1,opponentName:fd.get('opponentName'),opponentClub:fd.get('opponentClub'),opponentCity:fd.get('opponentCity'),result:fd.get('result'),method:fd.get('method'),roundsTotal:Number(fd.get('roundsTotal'))||3,roundEnded:fd.get('roundEnded')?Number(fd.get('roundEnded')):null,scoreSelf:fd.get('scoreSelf'),scoreOpponent:fd.get('scoreOpponent'),worked:fd.get('worked'),didntWork:fd.get('didntWork'),tags};if(cur)Object.assign(cur,p);else state.fights.push(p);save();go('event',{id:eid})};
  }

  app.querySelectorAll('[data-del-event]').forEach(b=>b.onclick=()=>modal('Удалить турнир?','Вместе с ним удалятся все бои.',()=>{const id=b.dataset.delEvent;state.events=state.events.filter(e=>e.id!==id);state.fights=state.fights.filter(f=>f.eventId!==id);save();go('events')}));
  app.querySelectorAll('[data-del-fight]').forEach(b=>b.onclick=()=>modal('Удалить бой?','Это действие нельзя отменить.',()=>{const id=b.dataset.delFight,f=state.fights.find(x=>x.id===id),eid=f?f.eventId:null;state.fights=state.fights.filter(x=>x.id!==id);save();eid?go('event',{id:eid}):go('events')}));

  app.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{const pl=Number(b.dataset.filter),first=state.events.filter(e=>e.place===pl).sort((a,b)=>b.date.localeCompare(a.date))[0];first?go('event',{id:first.id}):toast('Пока нет турниров с этим местом')});

  const ex=document.getElementById('export-json');
  if(ex)ex.onclick=()=>{const data=JSON.stringify({profile:state.profile,events:state.events,fights:state.fights},null,2);const b=new Blob([data],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='trophy-backup-'+new Date().toISOString().slice(0,10)+'.json';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u)};
  const im=document.getElementById('import-json');
  if(im)im.onclick=()=>{const i=document.createElement('input');i.type='file';i.accept='application/json';i.onchange=()=>{const f=i.files[0];if(!f)return;const fr=new FileReader();fr.onload=()=>{try{const d=JSON.parse(fr.result);if(!d.profile)throw 0;state.profile=d.profile;state.events=d.events||[];state.fights=d.fights||[];save();toast('Импортировано');go('profile')}catch(e){toast('Ошибка импорта')}};fr.readAsText(f)};i.click()};
  const rs=document.getElementById('reset-all');
  if(rs)rs.onclick=()=>modal('Удалить все данные?','Профиль и все бои будут стёрты.',()=>{localStorage.removeItem(STORAGE_KEY);state.profile=null;state.events=[];state.fights=[];go('profile')});
}

/* === Модалка / тост === */
function modal(t,txt,ok){const el=document.createElement('div');el.className='modal-bg';el.innerHTML=`<div class="modal"><h3>${esc(t)}</h3><p>${esc(txt)}</p><div class="actions"><button class="btn btn-danger" id="m-ok">Удалить</button><button class="btn btn-ghost" id="m-cancel">Отмена</button></div></div>`;document.body.appendChild(el);el.querySelector('#m-ok').onclick=()=>{el.remove();ok()};el.querySelector('#m-cancel').onclick=()=>el.remove();el.onclick=e=>{if(e.target===el)el.remove()}}
function toast(m){const el=document.createElement('div');el.className='toast';el.textContent=m;document.body.appendChild(el);setTimeout(()=>el.remove(),1800)}

/* === History === */
window.addEventListener('popstate',e=>{if(e.state&&e.state.route){state.route=e.state.route;render()}else{state.route={name:'profile',params:{}};render()}});

/* === Старт === */
load();
if(location.hash){const n=location.hash.slice(1);if(['profile','events','journal','stats','settings'].includes(n))state.route={name:n,params:{}}}
render();

if('serviceWorker' in navigator && location.protocol.startsWith('http')){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}))}
</script>
